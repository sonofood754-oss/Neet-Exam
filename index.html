<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEET STRIDE PRO | Final Audit</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap');
        
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Outfit', sans-serif;
        }

        .neo-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 2rem;
        }

        .bubble {
            width: 40px;
            height: 40px;
            border: 2px solid #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 900;
            font-size: 0.75rem;
        }

        .bubble.selected {
            background: #6366f1;
            border-color: #6366f1;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.5);
            transform: scale(1.1);
        }

        @media (max-width: 640px) {
            .bubble { width: 34px; height: 34px; border-radius: 8px; }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-7xl mx-auto mb-10 flex flex-col md:flex-row justify-between items-center gap-6">
        <div>
            <h1 class="text-4xl font-black italic tracking-tighter">STRIDE<span class="text-indigo-500">PRO</span></h1>
            <p class="text-slate-500 text-[10px] uppercase tracking-[0.3em]">Advanced Forensic Audit v4.2</p>
        </div>
        <div class="bg-slate-800/50 px-6 py-3 rounded-2xl border border-white/5">
            <span id="timer" class="text-2xl font-black text-indigo-400 font-mono">03:00:00</span>
        </div>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
        <section class="space-y-6">
            <div class="neo-card p-6">
                <input type="text" id="userName" placeholder="Student Name" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-3 outline-none focus:border-indigo-500 transition-all">
            </div>

            <div class="neo-card p-6">
                <div class="flex justify-between mb-3">
                    <span class="text-[10px] font-bold text-slate-500">ANSWER KEY (180 DIGITS)</span>
                    <span id="syncStatus" class="text-[10px] font-bold text-rose-500">OFFLINE</span>
                </div>
                <textarea id="masterKey" class="w-full h-24 bg-slate-900/50 border border-slate-700 rounded-xl p-3 font-mono text-xs mb-4 resize-none outline-none" placeholder="Paste here..."></textarea>
                <button onclick="syncEngine()" class="w-full bg-indigo-600 hover:bg-indigo-500 py-3 rounded-xl font-black transition-all">SYNC KEY</button>
            </div>

            <div id="actionArea" class="hidden">
                <button onclick="calculateScore()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-5 rounded-2xl font-black text-lg transition-all shadow-lg shadow-emerald-500/20">SUBMIT EXAM</button>
            </div>
            
            <div id="pdfArea" class="hidden">
                <button onclick="generatePDF()" class="w-full bg-white text-slate-900 py-5 rounded-2xl font-black text-lg flex items-center justify-center gap-2">
                    📥 DOWNLOAD REPORT
                </button>
            </div>
        </section>

        <section id="omrGrid" class="lg:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-4">
            </section>
    </main>

    <div id="scoreHud" class="fixed bottom-0 left-0 right-0 bg-slate-900/95 border-t border-white/10 p-6 translate-y-full transition-transform duration-500 z-[100]">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex gap-4">
                <div class="text-center"><p class="text-[10px] text-slate-500 font-bold">PHY</p><p id="resP" class="font-black text-xl">0</p></div>
                <div class="text-center"><p class="text-[10px] text-slate-500 font-bold">CHE</p><p id="resC" class="font-black text-xl">0</p></div>
                <div class="text-center"><p class="text-[10px] text-slate-500 font-bold">BIO</p><p id="resB" class="font-black text-xl">0</p></div>
            </div>
            <div class="text-right">
                <span class="text-4xl font-black" id="resTotal">0</span>
                <span class="text-indigo-500 font-bold">/720</span>
            </div>
        </div>
    </div>

    <script>
        let MASTER_KEY = [];
        let STUDENT_ANS = new Array(180).fill(null);
        let IS_LOCKED = false;

        function init() {
            const grid = document.getElementById('omrGrid');
            const sections = [
                {name: "Physics (1-45)", range: [1, 45]},
                {name: "Chemistry (46-90)", range: [46, 90]},
                {name: "Biology (91-180)", range: [91, 180]}
            ];

            sections.forEach(s => {
                let html = `<div class="neo-card p-4"><h3 class="text-xs font-bold text-indigo-400 mb-4 uppercase tracking-widest">${s.name}</h3>`;
                for(let i = s.range[0]; i <= s.range[1]; i++) {
                    html += `<div class="flex items-center justify-between mb-2">
                        <span class="text-[10px] text-slate-500 font-mono">${i}</span>
                        <div class="flex gap-1" data-q="${i}">
                            ${[1,2,3,4].map(n => `<div onclick="selectBubble(${i}, ${n}, this)" class="bubble rounded-lg">${n}</div>`).join('')}
                        </div>
                    </div>`;
                }
                grid.innerHTML += html + `</div>`;
            });
            startTimer();
        }

        function selectBubble(q, v, el) {
            if(IS_LOCKED) return;
            const row = el.parentElement;
            row.querySelectorAll('.bubble').forEach(b => b.classList.remove('selected'));
            if(STUDENT_ANS[q-1] === v) { STUDENT_ANS[q-1] = null; }
            else { STUDENT_ANS[q-1] = v; el.classList.add('selected'); }
        }

        function syncEngine() {
            const val = document.getElementById('masterKey').value;
            MASTER_KEY = val.match(/[1-4]/g) || [];
            if(MASTER_KEY.length >= 180) {
                document.getElementById('syncStatus').innerText = "SYNCED";
                document.getElementById('syncStatus').className = "text-[10px] font-bold text-emerald-500";
                document.getElementById('actionArea').classList.remove('hidden');
            } else { alert("Key must contain 180 digits (1-4)."); }
        }

        function calculateScore() {
            if(!confirm("Finalize responses?")) return;
            IS_LOCKED = true;
            document.getElementById('actionArea').classList.add('hidden');
            document.getElementById('pdfArea').classList.remove('hidden');
            document.getElementById('scoreHud').classList.remove('translate-y-full');

            let p=0, c=0, b=0;
            STUDENT_ANS.forEach((ans, i) => {
                const correct = parseInt(MASTER_KEY[i]);
                const pts = (ans === correct) ? 4 : (ans === null ? 0 : -1);
                if(i < 45) p += pts; else if(i < 90) c += pts; else b += pts;

                const bubbles = document.querySelectorAll(`[data-q="${i+1}"] .bubble`);
                bubbles.forEach(btn => {
                    const val = parseInt(btn.innerText);
                    if(ans === val) btn.style.backgroundColor = (ans === correct) ? "#10b981" : "#ef4444";
                    else if(val === correct && ans !== null) btn.style.border = "2px dashed #10b981";
                });
            });
            document.getElementById('resP').innerText = p;
            document.getElementById('resC').innerText = c;
            document.getElementById('resB').innerText = b;
            document.getElementById('resTotal').innerText = p+c+b;
        }

        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'pt', 'a4');
            const name = (document.getElementById('userName').value || "Student").toUpperCase();
            
            doc.setFillColor(15, 23, 42); doc.rect(0, 0, 600, 80, 'F');
            doc.setTextColor(255, 255, 255); doc.setFontSize(20); doc.text("NEET STRIDE PERFORMANCE REPORT", 40, 45);
            doc.setFontSize(10); doc.text(`CANDIDATE: ${name}`, 40, 65);

            doc.setTextColor(30, 41, 59); doc.setFontSize(14); doc.text("SUBJECT ANALYTICS", 40, 110);
            const data = [
                {n: "Physics", s: document.getElementById('resP').innerText},
                {n: "Chemistry", s: document.getElementById('resC').innerText},
                {n: "Biology", s: document.getElementById('resB').innerText}
            ];

            let y = 130;
            data.forEach(item => {
                doc.setFillColor(241, 245, 249); doc.rect(40, y, 515, 30, 'F');
                doc.setFontSize(10); doc.text(`${item.n}: ${item.s} Marks`, 55, y+18);
                y += 35;
            });

            doc.text("OMR VISUAL RECONSTRUCTION", 40, y+20);
            let sX = 40, sY = y + 50, colW = 130, rowH = 12;
            for(let i=0; i<180; i++){
                let col = Math.floor(i/45), row = i%45;
                let x = sX + (col*colW), yp = sY + (row*rowH);
                doc.setFontSize(6); doc.setTextColor(180); doc.text(`${i+1}`, x, yp);
                for(let b=1; b<=4; b++){
                    let bx = x+20+(b*18), by = yp-2;
                    if(STUDENT_ANS[i] == b) {
                        doc.setFillColor(STUDENT_ANS[i] == MASTER_KEY[i] ? 16 : 239, STUDENT_ANS[i] == MASTER_KEY[i] ? 185 : 68, STUDENT_ANS[i] == MASTER_KEY[i] ? 129 : 68);
                        doc.circle(bx, by, 4, 'F');
                    } else if(MASTER_KEY[i] == b && STUDENT_ANS[i] !== null) {
                        doc.setDrawColor(16, 185, 129); doc.circle(bx, by, 4, 'D');
                    } else {
                        doc.setDrawColor(220); doc.circle(bx, by, 4, 'D');
                    }
                }
            }
            doc.save(`NEET_Report_${name}.pdf`);
        }

        function startTimer() {
            let t = 10800;
            setInterval(() => {
                if(IS_LOCKED) return;
                t--;
                let h=Math.floor(t/3600), m=Math.floor((t%3600)/60), s=t%60;
                document.getElementById('timer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            }, 1000);
        }

        window.onload = init;
    </script>
</body>
</html>
