<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEET STRIDE PRO | Official Evaluator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    <style>
        @keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .timer-low { animation: pulse-red 1s infinite; color: #f43f5e !important; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900 pb-80">

    <div id="startOverlay" class="fixed inset-0 z-[200] bg-indigo-950 flex items-center justify-center p-6 text-center">
        <div class="bg-white p-8 rounded-[2.5rem] max-w-md w-full shadow-2xl">
            <h1 class="text-3xl font-black text-indigo-900 mb-2">NEET STRIDE PRO</h1>
            <p class="text-slate-500 text-sm mb-6 uppercase font-bold tracking-widest">3 Hour Timer • 180 Questions</p>
            <button onclick="startExamNow()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-all">START EXAM</button>
        </div>
    </div>

    <header class="bg-indigo-950 text-white p-5 shadow-xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <h1 class="text-xl font-black italic tracking-tighter">NEET STRIDE <span class="text-indigo-400">PRO</span></h1>
                <div id="timerDisplay" class="bg-indigo-900 px-4 py-1 rounded-full font-mono font-bold text-indigo-300 border border-indigo-700">03:00:00</div>
            </div>
            <div class="flex items-center gap-3">
                <input type="text" id="studentName" placeholder="Student Name" class="bg-indigo-900 border border-indigo-700 text-white px-3 py-2 rounded-xl text-xs w-32 outline-none focus:ring-1 focus:ring-indigo-400">
                <button onclick="window.location.reload()" class="bg-rose-600 px-4 py-2 rounded-xl font-bold text-[10px] shadow-lg active:scale-95">RESET</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 mt-8">
        <section class="mb-10 bg-white rounded-3xl border border-slate-200 p-6 shadow-sm">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="block text-xs font-black uppercase text-indigo-900">OCR Scan Answer Key</label>
                    <input type="file" id="imageInput" class="block w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-indigo-50 file:text-indigo-700 file:font-bold cursor-pointer">
                    <button id="ocrBtn" onclick="parseImage()" class="w-full bg-indigo-600 text-white py-2.5 rounded-xl font-bold text-xs shadow-md active:scale-95 transition-all">START OCR SCAN</button>
                </div>
                <div class="space-y-2 border-t md:border-t-0 md:border-l border-slate-100 md:pl-6">
                    <label class="block text-xs font-black uppercase text-slate-500">Manual Key Input</label>
                    <textarea id="textInput" class="w-full h-10 p-2 border border-slate-200 rounded-xl text-xs outline-none focus:ring-1 focus:ring-indigo-400" placeholder="Paste 180 digits (1-4) here..."></textarea>
                    <button onclick="parseText()" class="w-full bg-slate-900 text-white py-2.5 rounded-xl font-bold text-xs shadow-md active:scale-95 transition-all">LOCK KEY</button>
                </div>
            </div>
        </section>

        <div class="flex flex-col items-center gap-4 mb-12">
            <button id="submitBtn" onclick="submitExam()" class="bg-indigo-600 text-white px-12 py-5 rounded-3xl font-black text-xl shadow-2xl active:scale-95 transition-all">FINISH & EVALUATE</button>
            <button id="downloadBtn" onclick="generatePDF()" class="hidden bg-emerald-600 text-white px-12 py-5 rounded-3xl font-black text-xl shadow-xl flex items-center gap-2 active:scale-95 transition-all">📥 DOWNLOAD ANALYSIS</button>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-10" id="omrGrid"></div>
    </main>

    <div id="scoreBoard" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 w-[95%] max-w-4xl glass border-t-4 border-indigo-600 rounded-[2.5rem] shadow-2xl p-6 z-40 flex flex-col md:flex-row justify-between items-center gap-6">
        <div class="grid grid-cols-3 gap-4 flex-1 w-full text-center">
            <div class="p-3 bg-slate-50 rounded-2xl border border-slate-100">
                <p class="text-[9px] font-black text-indigo-600 uppercase">Physics</p>
                <p id="resPhy" class="text-2xl font-black">0</p>
                <p id="statsPhy" class="text-[8px] text-slate-400 font-bold uppercase">M:0 | U:45</p>
            </div>
            <div class="p-3 bg-slate-50 rounded-2xl border border-slate-100">
                <p class="text-[9px] font-black text-indigo-600 uppercase">Chemistry</p>
                <p id="resChem" class="text-2xl font-black">0</p>
                <p id="statsChem" class="text-[8px] text-slate-400 font-bold uppercase">M:0 | U:45</p>
            </div>
            <div class="p-3 bg-slate-50 rounded-2xl border border-slate-100">
                <p class="text-[9px] font-black text-indigo-600 uppercase">Biology</p>
                <p id="resBio" class="text-2xl font-black">0</p>
                <p id="statsBio" class="text-[8px] text-slate-400 font-bold uppercase">M:0 | U:90</p>
            </div>
        </div>
        <div class="text-center md:pl-6 md:border-l-2 border-slate-100">
            <p class="text-[9px] font-black text-slate-400 uppercase">Final Score</p>
            <p id="resTotal" class="text-5xl font-black text-indigo-700 leading-none">0</p>
            <p class="text-[10px] font-bold text-slate-300 mt-1">/ 720</p>
        </div>
    </div>

    <script>
        let masterKey = [], userSel = new Array(180).fill(null), isDone = false;
        let timeLeft = 3 * 60 * 60; // 3 Hours (10800 seconds)

        function startExamNow() {
            document.getElementById('startOverlay').style.display = 'none';
            const timerInterval = setInterval(() => {
                if (isDone) { clearInterval(timerInterval); return; }
                timeLeft--;
                let h = Math.floor(timeLeft / 3600);
                let m = Math.floor((timeLeft % 3600) / 60);
                let s = timeLeft % 60;
                const display = document.getElementById('timerDisplay');
                display.innerText = `${h < 10 ? '0'+h : h}:${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
                if (timeLeft < 300) display.classList.add('timer-low');
                if (timeLeft <= 0) { clearInterval(timerInterval); submitExam(); }
            }, 1000);
        }

        function init() {
            const grid = document.getElementById('omrGrid');
            const subjects = [
                { name: "Physics (1-45)", range: [1, 45] },
                { name: "Chemistry (46-90)", range: [46, 90] },
                { name: "Biology I (91-135)", range: [91, 135] },
                { name: "Biology II (136-180)", range: [136, 180] }
            ];
            subjects.forEach(sub => {
                const col = document.createElement('div');
                col.className = "space-y-1";
                col.innerHTML = `<div class="bg-indigo-50 text-indigo-700 p-2 rounded-xl text-center font-black text-[10px] uppercase border border-indigo-100 italic">${sub.name}</div>`;
                for (let i = sub.range[0]; i <= sub.range[1]; i++) {
                    const row = document.createElement('div');
                    row.className = "flex items-center justify-between p-2 bg-white rounded-xl border border-slate-100 shadow-sm";
                    row.innerHTML = `
                        <span class="text-[10px] font-black text-slate-300 w-5">${i}</span>
                        <div class="flex gap-1">
                            ${[1,2,3,4].map(n => `<button onclick="selectBubble(${i},'${n}',this)" class="w-7 h-7 rounded-lg border-2 border-slate-100 text-[10px] font-bold text-slate-400 hover:border-indigo-200 transition-all focus:outline-none">${n}</button>`).join('')}
                        </div>`;
                    col.appendChild(row);
                }
                grid.appendChild(col);
            });
        }

        function selectBubble(q, val, btn) {
            if (isDone) return;
            const idx = q - 1, row = btn.parentElement, btns = row.querySelectorAll('button');
            if (userSel[idx] === val) {
                btn.className = "w-7 h-7 rounded-lg border-2 border-slate-100 text-[10px] font-bold text-slate-400 transition-all";
                userSel[idx] = null;
            } else {
                btns.forEach(b => b.className = "w-7 h-7 rounded-lg border-2 border-slate-100 text-[10px] font-bold text-slate-400 transition-all");
                btn.className = "w-7 h-7 rounded-lg border-2 border-indigo-600 bg-indigo-600 text-white text-[10px] font-bold shadow-md transition-all scale-110";
                userSel[idx] = val;
            }
        }

        function parseText() {
            const val = document.getElementById('textInput').value;
            masterKey = val.match(/[1-4]/g) || [];
            if (masterKey.length >= 180) alert("Answer Key Locked!");
            else alert("Error: Found " + masterKey.length + " digits. Need 180.");
        }

        async function parseImage() {
            const file = document.getElementById('imageInput').files[0];
            if (!file) return alert("Select image first.");
            const btn = document.getElementById('ocrBtn'); btn.innerText = "SCANNING...";
            try {
                const worker = await Tesseract.createWorker('eng');
                const { data: { text } } = await worker.recognize(file);
                let all = text.match(/\d+/g) || [], filtered = [];
                for (let i = 0; i < all.length; i++) {
                    let n = parseInt(all[i]);
                    if (n >= 1 && n <= 180 && ["1","2","3","4"].includes(all[i+1])) { filtered[n-1] = all[i+1]; i++; }
                }
                masterKey = filtered; alert("Scan Complete!"); await worker.terminate();
            } catch (e) { alert("OCR Failed. Use Manual Input."); }
            btn.innerText = "START OCR SCAN";
        }

        function submitExam() {
            if (masterKey.length < 180) return alert("Setup the Answer Key first!");
            if (!confirm("Confirm submission?")) return;
            isDone = true;
            document.getElementById('submitBtn').classList.add('hidden');
            document.getElementById('downloadBtn').classList.remove('hidden');
            document.getElementById('scoreBoard').classList.remove('hidden');

            for (let i = 0; i < 180; i++) {
                const qNum = i + 1, s = userSel[i], c = masterKey[i];
                const bubbles = document.querySelectorAll(`button[onclick*="selectBubble(${qNum},"]`);
                bubbles.forEach(b => {
                    const bVal = b.innerText;
                    if (bVal === s) {
                        b.style.backgroundColor = (s === c) ? "#10b981" : "#f43f5e";
                        b.style.borderColor = (s === c) ? "#10b981" : "#f43f5e";
                        b.style.color = "white";
                    } else if (bVal === c && s !== null) {
                        b.style.border = "2px dashed #10b981"; b.style.color = "#10b981";
                    }
                });
            }
            updateUI();
        }

        function updateUI() {
            let s = { phy: { p: 0, m: 0, u: 0, c: 0 }, chem: { p: 0, m: 0, u: 0, c: 0 }, bio: { p: 0, m: 0, u: 0, c: 0 } };
            userSel.forEach((val, i) => {
                let cat = i < 45 ? 'phy' : (i < 90 ? 'chem' : 'bio');
                if (val === masterKey[i]) { s[cat].p += 4; s[cat].c++; }
                else if (val === null) { s[cat].u++; }
                else { s[cat].p -= 1; s[cat].m++; }
            });
            ['Phy', 'Chem', 'Bio'].forEach(k => {
                const low = k.toLowerCase();
                document.getElementById('res'+k).innerText = s[low].p;
                document.getElementById('stats'+k).innerText = `M:${s[low].m} | U:${s[low].u}`;
            });
            document.getElementById('resTotal').innerText = s.phy.p + s.chem.p + s.bio.p;
            return s;
        }

        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const name = document.getElementById('studentName').value || "Candidate";
            const stats = updateUI();
            const total = document.getElementById('resTotal').innerText;

            doc.setFillColor(30, 27, 75); doc.rect(0, 0, 210, 45, 'F');
            doc.setTextColor(255); doc.setFontSize(22); doc.text("NEET PERFORMANCE REPORT", 15, 20);
            doc.setFontSize(10); doc.text(`STUDENT: ${name.toUpperCase()} | SCORE: ${total}/720`, 15, 33);

            doc.setFillColor(245, 247, 250); doc.rect(15, 52, 180, 25, 'F');
            doc.setTextColor(0); doc.setFontSize(9);
            doc.text("SUBJECT", 20, 58); doc.text("SCORE", 70, 58); doc.text("CORRECT", 100, 58); doc.text("MISTAKES", 135, 58); doc.text("SKIPPED", 170, 58);
            
            let y = 65;
            [['Physics', stats.phy], ['Chemistry', stats.chem], ['Biology', stats.bio]].forEach(row => {
                doc.text(row[0], 20, y); doc.text(row[1].p.toString(), 70, y); doc.text(row[1].c.toString(), 100, y); doc.text(row[1].m.toString(), 135, y); doc.text(row[1].u.toString(), 170, y);
                y += 5;
            });

            let yGrid = 90;
            for (let i = 0; i < 180; i++) {
                let col = Math.floor(i/45), row = i%45, x = 15+(col*46), yPos = yGrid+(row*4);
                doc.setFontSize(5); doc.setTextColor(180); doc.text(`${i+1}`, x, yPos);
                for (let b = 1; b <= 4; b++) {
                    let bx = x+6+(b*5), sel = userSel[i], cor = masterKey[i];
                    if (sel == b) { doc.setFillColor(sel == cor ? [16,185,129] : [244,63,94]); doc.circle(bx, yPos-1, 1.2, 'F'); }
                    else if (cor == b && sel !== null) { doc.setDrawColor(16,185,129); doc.circle(bx, yPos-1, 1.2, 'D'); }
                    else { doc.setDrawColor(220); doc.circle(bx, yPos-1, 1.2, 'D'); }
                }
            }

            // iPad Safari Download Fix
            const pdfBlob = doc.output('blob');
            const url = URL.createObjectURL(pdfBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `${name}_NEET_Result.pdf`;
            document.body.appendChild(link);
            link.click();
            setTimeout(() => {
                document.body.removeChild(link);
                window.URL.revokeObjectURL(url);
                // Open in new tab if download trigger fails
                if(!link.clicked) window.open(url, '_blank');
            }, 100);
        }

        init(); // Starts the grid immediately
    </script>
</body>
</html>
