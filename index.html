<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STRIDEPRO | Modern OMR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap');
        body { background: #0b0e14; color: #f8fafc; font-family: 'Outfit', sans-serif; }
        
        /* Modern Continuous Grid Layout */
        .omr-master-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            background: rgba(30, 41, 59, 0.2);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        @media (max-width: 1200px) { .omr-master-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .omr-master-grid { grid-template-columns: 1fr; } }

        .omr-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: 12px;
            transition: all 0.2s;
        }

        .omr-row:hover { border-color: #6366f1; transform: translateX(5px); }

        .bubble {
            width: 28px;
            height: 28px;
            border: 1.5px solid #334155;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bubble.selected {
            background: #6366f1;
            border-color: #818cf8;
            color: white;
            box-shadow: 0 0 12px rgba(99, 102, 241, 0.5);
            transform: scale(1.1);
        }

        .q-tag { font-size: 11px; font-weight: 800; color: #64748b; width: 25px; }

        /* Status Bar Fix */
        .status-bar {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(11, 14, 20, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="status-bar mb-8">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-3xl font-black italic tracking-tighter text-indigo-500">STRIDE<span class="text-white">PRO</span></h1>
            <div class="flex items-center gap-6">
                <div class="text-right hidden md:block">
                    <p class="text-[10px] text-slate-500 font-bold uppercase">Timer</p>
                    <p id="timer" class="text-2xl font-black font-mono">03:00:00</p>
                </div>
                <button onclick="calculate()" id="submitBtn" class="hidden bg-indigo-600 px-8 py-3 rounded-xl font-bold uppercase text-xs hover:bg-indigo-500 transition-all">Submit Audit</button>
                <button onclick="generatePDF()" id="pdfBtn" class="hidden bg-white text-black px-8 py-3 rounded-xl font-bold uppercase text-xs">Download Report</button>
            </div>
        </div>
    </div>

    <main class="max-w-7xl mx-auto space-y-8">
        <section class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <input type="text" id="studentName" placeholder="Enter Student Name" class="bg-slate-900 border border-slate-800 p-4 rounded-xl outline-none focus:border-indigo-500">
            <div class="flex gap-2">
                <input type="text" id="keyInput" placeholder="Paste 180 Digit Key" class="flex-1 bg-slate-900 border border-slate-800 p-4 rounded-xl outline-none focus:border-indigo-500 font-mono text-xs">
                <button onclick="sync()" class="bg-slate-800 px-6 rounded-xl font-bold text-xs uppercase hover:bg-slate-700">Sync</button>
            </div>
        </section>

        <div class="omr-master-grid" id="mainGrid"></div>
    </main>

    <script>
        let MASTER = [];
        let STUDENT = new Array(180).fill(null);
        let LOCKED = false;
        let REPORT = { phy: {c:0,w:0,u:0, listW:[]}, chem: {c:0,w:0,u:0, listW:[]}, bio: {c:0,w:0,u:0, listW:[]} };

        function init() {
            const grid = document.getElementById('mainGrid');
            for(let i=1; i<=180; i++) {
                grid.innerHTML += `
                    <div class="omr-row">
                        <span class="q-tag">${i}.</span>
                        <div class="flex gap-1.5" data-q="${i}">
                            <div class="bubble" onclick="mark(${i}, 1, this)">1</div>
                            <div class="bubble" onclick="mark(${i}, 2, this)">2</div>
                            <div class="bubble" onclick="mark(${i}, 3, this)">3</div>
                            <div class="bubble" onclick="mark(${i}, 4, this)">4</div>
                        </div>
                    </div>`;
            }
            startTimer();
        }

        function mark(q, v, el) {
            if(LOCKED) return;
            const parent = el.parentElement;
            parent.querySelectorAll('.bubble').forEach(b => b.classList.remove('selected'));
            if(STUDENT[q-1] === v) { STUDENT[q-1] = null; }
            else { STUDENT[q-1] = v; el.classList.add('selected'); }
        }

        function sync() {
            const val = document.getElementById('keyInput').value;
            MASTER = val.match(/[1-4]/g) || [];
            if(MASTER.length < 180) return alert("Error: 180 digits required.");
            document.getElementById('submitBtn').classList.remove('hidden');
            alert("Engine Synchronized.");
        }

        function calculate() {
            if(!confirm("Submit final audit?")) return;
            LOCKED = true;
            document.getElementById('submitBtn').classList.add('hidden');
            document.getElementById('pdfBtn').classList.remove('hidden');

            STUDENT.forEach((ans, i) => {
                const cor = parseInt(MASTER[i]);
                const q = i + 1;
                let s = q <= 45 ? 'phy' : (q <= 90 ? 'chem' : 'bio');
                
                if(ans === null) { REPORT[s].u++; }
                else if(ans === cor) { REPORT[s].c++; }
                else { REPORT[s].w++; REPORT[s].listW.push(q); }

                // Visual Glow-up
                const bubbles = document.querySelectorAll(`[data-q="${q}"] .bubble`);
                bubbles.forEach(b => {
                    const val = parseInt(b.innerText);
                    if(val === ans) b.style.background = (ans === cor) ? "#10b981" : "#ef4444";
                    if(val === cor && ans !== null) b.style.border = "2px dashed #10b981";
                });
            });
        }

        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'pt', 'a4');
            const name = document.getElementById('studentName').value || "STUDENT";

            doc.setFillColor(15, 23, 42); doc.rect(0, 0, 600, 80, 'F');
            doc.setTextColor(255); doc.setFontSize(22); doc.text("STRIDEPRO FORENSIC ANALYSIS", 40, 45);
            doc.setFontSize(10); doc.text(`CANDIDATE: ${name.toUpperCase()}`, 40, 65);

            let y = 120;
            const subjects = [
                {n: "PHYSICS", d: REPORT.phy},
                {n: "CHEMISTRY", d: REPORT.chem},
                {n: "BIOLOGY", d: REPORT.bio}
            ];

            subjects.forEach(sub => {
                doc.setFillColor(245); doc.roundedRect(40, y, 515, 65, 5, 5, 'F');
                doc.setTextColor(30); doc.setFontSize(12); doc.text(sub.n, 55, y+20);
                doc.setFontSize(9); doc.setTextColor(80);
                doc.text(`Marks: ${sub.d.c*4 - sub.d.w} | Correct: ${sub.d.c} | Wrong: ${sub.d.w} | Unattempted: ${sub.d.u}`, 55, y+38);
                doc.text(`Incorrect Qs: ${sub.d.listW.join(', ') || 'None'}`, 55, y+52, {maxWidth: 480});
                y += 80;
            });

            // Reconstruct OMR in PDF
            doc.setFontSize(14); doc.setTextColor(30); doc.text("VISUAL RECONSTRUCTION", 40, y+20);
            let sx=40, sy=y+50;
            for(let i=0; i<180; i++) {
                let col = Math.floor(i/45), row = i%45;
                let x = sx + (col*130), yp = sy + (row*11.5);
                doc.setFontSize(6); doc.setTextColor(180); doc.text(`${i+1}`, x, yp);
                for(let b=1; b<=4; b++) {
                    let bx = x+20+(b*18), by = yp-2;
                    if(STUDENT[i] == b) {
                        doc.setFillColor(STUDENT[i] == MASTER[i] ? 16 : 239, STUDENT[i] == MASTER[i] ? 185 : 68, 129);
                        doc.circle(bx, by, 3.8, 'F');
                    } else {
                        doc.setDrawColor(200); doc.circle(bx, by, 3.8, 'D');
                    }
                }
            }
            doc.save(`STRIDE_REPORT_${name}.pdf`);
        }

        function startTimer() {
            let s = 10800;
            setInterval(() => { if(!LOCKED) { s--; let h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sc=s%60; document.getElementById('timer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${sc.toString().padStart(2,'0')}`; }}, 1000);
        }

        init();
    </script>
</body>
</html>
