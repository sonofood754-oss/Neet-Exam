<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STRIDEPRO | Forensic Precision</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap');
        body { background: #080a0f; color: #f8fafc; font-family: 'Outfit', sans-serif; }
        
        /* Forces 4 columns side-by-side on iPad/PC */
        .omr-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-width: 100%;
            margin: 0 auto;
        }

        .omr-column {
            background: rgba(30, 41, 59, 0.2);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 8px;
        }

        /* Tightens the gap between Number and Bubbles */
        .omr-row {
            display: flex;
            align-items: center;
            padding: 4px 6px;
            margin-bottom: 2px;
            border-radius: 6px;
            background: rgba(15, 23, 42, 0.4);
            justify-content: flex-start; /* Keeps them close together */
        }

        .bubble {
            width: 24px;
            height: 24px;
            border: 1.2px solid #334155;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.15s;
            margin-left: 6px; /* Small gap between bubbles */
        }

        .bubble.selected {
            background: #6366f1;
            border-color: #818cf8;
            color: white;
            box-shadow: 0 0 8px rgba(99, 102, 241, 0.4);
        }

        .q-tag { font-size: 10px; font-weight: 800; color: #64748b; width: 22px; text-align: right; margin-right: 8px; }

        .header-fixed {
            position: sticky;
            top: 0; z-index: 50;
            background: rgba(8, 10, 15, 0.9);
            backdrop-filter: blur(12px);
            padding: 10px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body class="pb-10">

    <div class="header-fixed mb-4">
        <div class="flex justify-between items-center max-w-full">
            <h1 class="text-xl font-black italic text-indigo-500">STRIDE<span class="text-white">PRO</span></h1>
            <div class="flex items-center gap-3">
                <div id="timer" class="font-mono text-lg bg-slate-900 px-3 py-1 rounded border border-slate-700">03:00:00</div>
                <button onclick="calculate()" id="submitBtn" class="hidden bg-indigo-600 px-4 py-1.5 rounded font-bold uppercase text-[9px] tracking-widest">Submit</button>
                <button onclick="generatePDF()" id="pdfBtn" class="hidden bg-white text-black px-4 py-1.5 rounded font-bold uppercase text-[9px] tracking-widest">PDF Report</button>
            </div>
        </div>
    </div>

    <main class="px-2 space-y-4">
        <div class="flex flex-wrap gap-2 mb-4">
            <input type="text" id="studentName" placeholder="Name" class="bg-slate-900 border border-slate-800 p-2 rounded-lg outline-none focus:border-indigo-500 text-xs w-40">
            <input type="text" id="keyInput" placeholder="Paste 180 Digit Key" class="flex-1 bg-slate-900 border border-slate-800 p-2 rounded-lg outline-none focus:border-indigo-500 font-mono text-xs">
            <button onclick="sync()" class="bg-indigo-600 px-4 rounded-lg font-bold text-[9px] uppercase">Sync</button>
        </div>

        <div class="omr-container">
            <div class="omr-column">
                <div class="text-[9px] font-bold text-center text-indigo-400 mb-2">PHY (1-45)</div>
                <div id="col-1"></div>
            </div>
            <div class="omr-column">
                <div class="text-[9px] font-bold text-center text-emerald-400 mb-2">CHEM (46-90)</div>
                <div id="col-2"></div>
            </div>
            <div class="omr-column">
                <div class="text-[9px] font-bold text-center text-rose-400 mb-2">BIO (91-135)</div>
                <div id="col-3"></div>
            </div>
            <div class="omr-column">
                <div class="text-[9px] font-bold text-center text-rose-400 mb-2">BIO (136-180)</div>
                <div id="col-4"></div>
            </div>
        </div>
    </main>

    <script>
        let MASTER = [];
        let STUDENT = new Array(180).fill(null);
        let LOCKED = false;
        let REPORT = { phy: {c:0,w:0,u:0, listW:[]}, chem: {c:0,w:0,u:0, listW:[]}, bio: {c:0,w:0,u:0, listW:[]} };

        function init() {
            render(1, 45, 'col-1'); render(46, 90, 'col-2');
            render(91, 135, 'col-3'); render(136, 180, 'col-4');
            startTime();
        }

        function render(s, e, id) {
            const container = document.getElementById(id);
            for(let i=s; i<=e; i++) {
                container.innerHTML += `
                    <div class="omr-row">
                        <span class="q-tag">${i}</span>
                        <div class="flex" data-q="${i}">
                            ${[1,2,3,4].map(n => `<div class="bubble" onclick="mark(${i}, ${n}, this)">${n}</div>`).join('')}
                        </div>
                    </div>`;
            }
        }

        function mark(q, v, el) {
            if(LOCKED) return;
            el.parentElement.querySelectorAll('.bubble').forEach(b => b.classList.remove('selected'));
            if(STUDENT[q-1] === v) { STUDENT[q-1] = null; }
            else { STUDENT[q-1] = v; el.classList.add('selected'); }
        }

        function sync() {
            const val = document.getElementById('keyInput').value;
            MASTER = val.match(/[1-4]/g) || [];
            if(MASTER.length < 180) return alert("Requires 180 digits.");
            document.getElementById('submitBtn').classList.remove('hidden');
        }

        function calculate() {
            if(!confirm("Submit audit?")) return;
            LOCKED = true;
            document.getElementById('submitBtn').classList.add('hidden');
            document.getElementById('pdfBtn').classList.remove('hidden');

            STUDENT.forEach((ans, i) => {
                const cor = parseInt(MASTER[i]);
                const q = i + 1;
                let s = q <= 45 ? 'phy' : (q <= 90 ? 'chem' : 'bio');
                if(ans === null) REPORT[s].u++;
                else if(ans === cor) REPORT[s].c++;
                else { REPORT[s].w++; REPORT[s].listW.push(q); }

                const bubbles = document.querySelectorAll(`[data-q="${q}"] .bubble`);
                bubbles.forEach(b => {
                    const val = parseInt(b.innerText);
                    if(val === ans) b.style.background = (ans === cor) ? "#10b981" : "#ef4444";
                    if(val === cor && ans !== null) b.style.border = "1.5px dashed #10b981";
                });
            });
        }

        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'pt', 'a4');
            const name = document.getElementById('studentName').value || "STUDENT";

            doc.setFillColor(15, 23, 42); doc.rect(0, 0, 600, 60, 'F');
            doc.setTextColor(255); doc.setFontSize(18); doc.text("STRIDEPRO REPORT", 40, 38);
            
            let y = 100;
            const subs = [ {n: "PHYSICS", d: REPORT.phy}, {n: "CHEMISTRY", d: REPORT.chem}, {n: "BIOLOGY", d: REPORT.bio} ];
            subs.forEach(sub => {
                doc.setFillColor(245); doc.roundedRect(40, y, 515, 45, 5, 5, 'F');
                doc.setTextColor(30); doc.setFontSize(10); doc.text(sub.n, 50, y+15);
                doc.setFontSize(8); doc.text(`Score: ${sub.d.c*4 - sub.d.w} | Wrong: ${sub.d.listW.join(', ') || 'None'}`, 50, y+30, {maxWidth: 480});
                y += 55;
            });

            // Standardized PDF Reconstruction
            let sx=40, sy=y+30;
            for(let i=0; i<180; i++) {
                let col = Math.floor(i/45), row = i%45;
                let x = sx + (col*135), yp = sy + (row*11);
                doc.setFontSize(5); doc.setTextColor(150); doc.text(`${i+1}`, x, yp);
                for(let b=1; b<=4; b++) {
                    let bx = x+15+(b*16), by = yp-2;
                    doc.setDrawColor(200);
                    if(STUDENT[i] == b) {
                        doc.setFillColor(STUDENT[i] == MASTER[i] ? 16 : 239, STUDENT[i] == MASTER[i] ? 185 : 68, 129);
                        doc.circle(bx, by, 3, 'F');
                    } else { doc.circle(bx, by, 3, 'D'); }
                }
            }
            doc.save(`STRIDE_${name}.pdf`);
        }

        function startTime() {
            let s = 10800;
            setInterval(() => { if(!LOCKED) { s--; let h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sc=s%60; document.getElementById('timer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${sc.toString().padStart(2,'0')}`; }}, 1000);
        }
        init();
    </script>
</body>
</html>
