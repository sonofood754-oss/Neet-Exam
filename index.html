<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STRIDEPRO | Forensic Precision</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap');
        body { background: #080a0f; color: #f8fafc; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* Forced 4-Column Layout for iPad/PC */
        .omr-master-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-width: 100%;
            margin: 0 auto;
        }

        .omr-column {
            background: rgba(30, 41, 59, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 5px;
        }

        /* Precision Zero-Gap Rows */
        .omr-row {
            display: flex;
            align-items: center;
            padding: 3px 5px;
            margin-bottom: 2px;
            background: rgba(15, 23, 42, 0.4);
            border-radius: 8px;
        }

        /* Square Bubbles - Restored from Previous Version */
        .bubble {
            width: 30px;
            height: 30px;
            border: 1.5px solid #334155;
            background: rgba(15, 23, 42, 0.6);
            color: #94a3b8;
            font-weight: 800;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px; /* Square style */
            margin-left: 5px;
            cursor: pointer;
            transition: all 0.1s;
        }

        .bubble.selected {
            background: #6366f1;
            border-color: #818cf8;
            color: white;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
        }

        .q-tag { font-size: 10px; font-weight: 800; color: #64748b; width: 22px; text-align: right; margin-right: 5px; }
        
        .header-hud {
            position: sticky;
            top: 0; z-index: 100;
            background: rgba(8, 10, 15, 0.9);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <div class="header-hud flex justify-between items-center">
        <h1 class="text-2xl font-black italic text-indigo-500">STRIDE<span class="text-white">PRO</span></h1>
        <div class="flex items-center gap-4">
            <div id="timer" class="font-mono text-xl bg-slate-900 px-4 py-1 rounded border border-slate-700">03:00:00</div>
            <button onclick="calculate()" id="submitBtn" class="hidden bg-indigo-600 px-5 py-2 rounded font-bold text-[10px] uppercase">Analyze</button>
            <button onclick="generatePDF()" id="pdfBtn" class="hidden bg-white text-black px-5 py-2 rounded font-bold text-[10px] uppercase">Download Report</button>
        </div>
    </div>

    <main class="p-4 space-y-4">
        <div class="flex gap-2">
            <input type="text" id="studentName" placeholder="Student Name" class="bg-slate-900 border border-slate-800 p-3 rounded-xl outline-none text-sm w-1/3">
            <input type="text" id="keyInput" placeholder="Paste 180 Digit Key" class="flex-1 bg-slate-900 border border-slate-800 p-3 rounded-xl outline-none font-mono text-xs">
            <button onclick="sync()" class="bg-indigo-600 px-6 rounded-xl font-bold text-xs">SYNC</button>
        </div>

        <div class="omr-master-container">
            <div class="omr-column"><div class="text-[9px] font-black text-center mb-2 text-indigo-400">PHYSICS (1-45)</div><div id="col-1"></div></div>
            <div class="omr-column"><div class="text-[9px] font-black text-center mb-2 text-emerald-400">CHEMISTRY (46-90)</div><div id="col-2"></div></div>
            <div class="omr-column"><div class="text-[9px] font-black text-center mb-2 text-rose-400">BIOLOGY (91-135)</div><div id="col-3"></div></div>
            <div class="omr-column"><div class="text-[9px] font-black text-center mb-2 text-rose-400">BIOLOGY (136-180)</div><div id="col-4"></div></div>
        </div>
    </main>

    <script>
        let MASTER = [];
        let STUDENT = new Array(180).fill(null);
        let LOCKED = false;

        function init() {
            render(1, 45, 'col-1'); render(46, 90, 'col-2');
            render(91, 135, 'col-3'); render(136, 180, 'col-4');
            startClock();
        }

        function render(s, e, id) {
            const el = document.getElementById(id);
            for(let i=s; i<=e; i++) {
                el.innerHTML += `<div class="omr-row"><span class="q-tag">${i}</span><div class="flex" data-q="${i}">${[1,2,3,4].map(n => `<div class="bubble" onclick="mark(${i},${n},this)">${n}</div>`).join('')}</div></div>`;
            }
        }

        function mark(q, v, el) {
            if(LOCKED) return;
            el.parentElement.querySelectorAll('.bubble').forEach(b => b.classList.remove('selected'));
            if(STUDENT[q-1] === v) STUDENT[q-1] = null;
            else { STUDENT[q-1] = v; el.classList.add('selected'); }
        }

        function sync() {
            MASTER = document.getElementById('keyInput').value.match(/[1-4]/g) || [];
            if(MASTER.length >= 180) document.getElementById('submitBtn').classList.remove('hidden');
        }

        function calculate() {
            LOCKED = true;
            document.getElementById('submitBtn').classList.add('hidden');
            document.getElementById('pdfBtn').classList.remove('hidden');
            STUDENT.forEach((ans, i) => {
                const cor = parseInt(MASTER[i]);
                const bubbles = document.querySelectorAll(`[data-q="${i+1}"] .bubble`);
                bubbles.forEach(b => {
                    const val = parseInt(b.innerText);
                    if(val === ans) b.style.background = (ans === cor) ? "#10b981" : "#ef4444";
                    if(val === cor && ans !== null) b.style.border = "2px dashed #10b981";
                });
            });
        }

        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'pt', 'a4');
            const name = document.getElementById('studentName').value || "STUDENT";
            
            doc.setFillColor(15, 23, 42); doc.rect(0, 0, 600, 70, 'F');
            doc.setTextColor(255); doc.setFontSize(20); doc.text("STRIDEPRO PERFORMANCE REPORT", 40, 45);

            let y = 100;
            const sections = [
                {n: "PHYSICS", start: 0, end: 44},
                {n: "CHEMISTRY", start: 45, end: 89},
                {n: "BIOLOGY", start: 90, end: 179}
            ];

            sections.forEach(sec => {
                let c=0, w=0, u=[];
                for(let i=sec.start; i<=sec.end; i++) {
                    if(STUDENT[i] === null) u.push(i+1);
                    else if(STUDENT[i] == MASTER[i]) c++;
                    else w++;
                }
                doc.setFillColor(245); doc.roundedRect(40, y, 515, 55, 5, 5, 'F');
                doc.setTextColor(40); doc.setFontSize(11); doc.text(sec.n, 50, y+20);
                doc.setFontSize(9); doc.text(`Score: ${c*4-w} | Correct: ${c} | Wrong: ${w}`, 50, y+35);
                // HIGHLIGHT UNATTENDED QUESTIONS
                doc.setTextColor(180, 0, 0); 
                doc.text(`Unattended Qs: ${u.join(', ') || 'None'}`, 50, y+48, {maxWidth: 480});
                y += 70;
            });

            // Visual Reconstruction Map
            let sx=40, sy=y+20;
            for(let i=0; i<180; i++) {
                let col = Math.floor(i/45), row = i%45, x = sx+(col*135), yp = sy+(row*11);
                doc.setFontSize(5); 
                // Color number red if unattended
                doc.setTextColor(STUDENT[i] === null ? [255, 0, 0] : [150, 150, 150]);
                doc.text(`${i+1}`, x, yp);
                for(let b=1; b<=4; b++) {
                    let bx = x+18+(b*16), by = yp-2;
                    if(STUDENT[i] == b) {
                        doc.setFillColor(STUDENT[i] == MASTER[i] ? [16, 185, 129] : [239, 68, 68]);
                        doc.circle(bx, by, 3.2, 'F');
                    } else { 
                        doc.setDrawColor(220); 
                        if(STUDENT[i] === null) doc.setDashPattern([1, 1], 0); // Red dashed circle for skipped
                        doc.circle(bx, by, 3.2, 'D');
                        doc.setDashPattern([], 0);
                    }
                }
            }
            doc.save(`Report_${name}.pdf`);
        }

        function startClock() {
            let s = 10800;
            setInterval(() => { if(!LOCKED) { s--; let h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sc=s%60; document.getElementById('timer').innerText = `${h}:${m}:${sc}`; }}, 1000);
        }
        init();
    </script>
</body>
</html>
