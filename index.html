<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEET STRIDE PRO | Forensic Ultra</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap');
        
        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #f8fafc;
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.5rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .bubble {
            width: 32px;
            height: 32px;
            border: 1.5px solid #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 700;
            font-size: 0.7rem;
            border-radius: 8px;
            background: rgba(15, 23, 42, 0.5);
        }

        .bubble:active { transform: scale(0.85); }

        .bubble.selected {
            background: linear-gradient(135deg, #6366f1, #4338ca);
            border-color: #818cf8;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.6);
            color: white;
        }

        /* Fixed Horizontal Layout */
        .omr-grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            width: 100%;
        }

        @media (max-width: 1100px) {
            .omr-grid-container { grid-template-columns: 1fr; }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-4 lg:p-10">

    <header class="max-w-[1600px] mx-auto mb-10 flex flex-col md:flex-row justify-between items-end gap-6">
        <div>
            <h1 class="text-5xl font-black tracking-tighter italic text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400">STRIDE<span class="text-white">PRO</span></h1>
            <p class="text-slate-500 text-xs font-bold uppercase tracking-[0.5em] mt-2">V4.2 Forensic Analytics Engine</p>
        </div>
        <div class="glass-panel px-8 py-4 flex items-center gap-6">
            <div class="text-right">
                <p class="text-[10px] text-indigo-400 font-black uppercase">Session Timer</p>
                <p id="timer" class="text-3xl font-black font-mono">03:00:00</p>
            </div>
        </div>
    </header>

    <main class="max-w-[1600px] mx-auto space-y-8">
        
        <section class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="glass-panel p-6 lg:col-span-1">
                <label class="text-[10px] font-bold text-slate-500 mb-2 block uppercase">Candidate Name</label>
                <input type="text" id="userName" placeholder="Enter Full Name" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-3 outline-none focus:border-indigo-500 transition-all font-bold">
            </div>
            
            <div class="glass-panel p-6 lg:col-span-2">
                <div class="flex justify-between mb-2">
                    <label class="text-[10px] font-bold text-slate-500 uppercase">Forensic Answer Key</label>
                    <span id="syncStatus" class="text-[10px] font-bold text-rose-500">ENGINE OFFLINE</span>
                </div>
                <textarea id="masterKey" class="w-full h-12 bg-slate-900/50 border border-slate-700 rounded-xl p-3 font-mono text-xs mb-3 resize-none outline-none focus:border-indigo-500" placeholder="Paste 180 digits..."></textarea>
                <button onclick="syncEngine()" class="w-full bg-indigo-600 hover:bg-indigo-500 py-3 rounded-xl font-black text-sm transition-all uppercase tracking-widest">Synchronize Key</button>
            </div>

            <div class="glass-panel p-6 flex flex-col justify-center gap-3">
                <div id="actionArea" class="hidden">
                    <button onclick="calculateScore()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-xl font-black text-lg transition-all shadow-lg shadow-emerald-500/20">FINISH EXAM</button>
                </div>
                <div id="pdfArea" class="hidden">
                    <button onclick="generatePDF()" class="w-full bg-white text-slate-900 py-4 rounded-xl font-black text-lg flex items-center justify-center gap-2">📥 DOWNLOAD AUDIT</button>
                </div>
            </div>
        </section>

        <section class="omr-grid-container">
            <div class="glass-panel overflow-hidden">
                <div class="bg-indigo-600/20 p-4 border-b border-white/5"><h3 class="font-black text-sm uppercase tracking-widest">Physics (1-45)</h3></div>
                <div id="phyGrid" class="p-4 space-y-2 h-[600px] overflow-y-auto"></div>
            </div>
            <div class="glass-panel overflow-hidden">
                <div class="bg-indigo-600/20 p-4 border-b border-white/5"><h3 class="font-black text-sm uppercase tracking-widest">Chemistry (46-90)</h3></div>
                <div id="chemGrid" class="p-4 space-y-2 h-[600px] overflow-y-auto"></div>
            </div>
            <div class="glass-panel overflow-hidden">
                <div class="bg-indigo-600/20 p-4 border-b border-white/5"><h3 class="font-black text-sm uppercase tracking-widest">Biology (91-180)</h3></div>
                <div id="bioGrid" class="p-4 space-y-2 h-[600px] overflow-y-auto"></div>
            </div>
        </section>
    </main>

    <div id="scoreHud" class="fixed bottom-0 left-0 right-0 bg-slate-900/90 backdrop-blur-3xl border-t border-white/10 p-6 translate-y-full transition-transform duration-700 z-[1000]">
        <div class="max-w-[1600px] mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex gap-6">
                <div class="text-center"><p class="text-[10px] text-indigo-400 font-bold">PHYSICS</p><p id="resP" class="text-3xl font-black">0</p></div>
                <div class="text-center"><p class="text-[10px] text-indigo-400 font-bold">CHEMISTRY</p><p id="resC" class="text-3xl font-black">0</p></div>
                <div class="text-center"><p class="text-[10px] text-indigo-400 font-bold">BIOLOGY</p><p id="resB" class="text-3xl font-black">0</p></div>
            </div>
            <div class="flex items-baseline gap-2">
                <span class="text-sm text-slate-500 font-bold">TOTAL SCORE:</span>
                <span id="resTotal" class="text-7xl font-black text-white italic">0</span>
                <span class="text-2xl text-indigo-500 font-black">/720</span>
            </div>
        </div>
    </div>

    <script>
        let MASTER_KEY = [];
        let STUDENT_ANS = new Array(180).fill(null);
        let IS_LOCKED = false;
        let ANALYSIS = {
            phy: { c: 0, w: 0, u: 45 },
            chem: { c: 0, w: 0, u: 45 },
            bio: { c: 0, w: 0, u: 90 }
        };

        function buildSection(containerId, start, end) {
            const container = document.getElementById(containerId);
            for(let i = start; i <= end; i++) {
                const row = document.createElement('div');
                row.className = "flex items-center justify-between py-1 px-2 hover:bg-white/5 rounded-lg transition-all";
                row.innerHTML = `<span class="text-[10px] font-bold text-slate-500 w-6">${i}</span>
                    <div class="flex gap-1.5" data-q="${i}">
                        ${[1,2,3,4].map(n => `<div onclick="selectBubble(${i}, ${n}, this)" class="bubble">${n}</div>`).join('')}
                    </div>`;
                container.appendChild(row);
            }
        }

        function selectBubble(q, v, el) {
            if(IS_LOCKED) return;
            const row = el.parentElement;
            row.querySelectorAll('.bubble').forEach(b => b.classList.remove('selected'));
            if(STUDENT_ANS[q-1] === v) { STUDENT_ANS[q-1] = null; }
            else { STUDENT_ANS[q-1] = v; el.classList.add('selected'); }
        }

        function syncEngine() {
            const val = document.getElementById('masterKey').value;
            MASTER_KEY = val.match(/[1-4]/g) || [];
            if(MASTER_KEY.length >= 180) {
                document.getElementById('syncStatus').innerText = "ENGINE SYNCHRONIZED";
                document.getElementById('syncStatus').className = "text-[10px] font-bold text-emerald-400";
                document.getElementById('actionArea').classList.remove('hidden');
            } else { alert("Error: 180 digits required."); }
        }

        function calculateScore() {
            if(!confirm("Finalize responses?")) return;
            IS_LOCKED = true;
            document.getElementById('actionArea').classList.add('hidden');
            document.getElementById('pdfArea').classList.remove('hidden');
            document.getElementById('scoreHud').classList.remove('translate-y-full');

            let pMarks=0, cMarks=0, bMarks=0;
            ANALYSIS = { phy: {c:0, w:0, u:0}, chem: {c:0, w:0, u:0}, bio: {c:0, w:0, u:0} };

            STUDENT_ANS.forEach((ans, i) => {
                const correct = parseInt(MASTER_KEY[i]);
                const qNum = i + 1;
                let section = qNum <= 45 ? 'phy' : (qNum <= 90 ? 'chem' : 'bio');
                
                if(ans === null) { ANALYSIS[section].u++; }
                else if(ans === correct) { ANALYSIS[section].c++; }
                else { ANALYSIS[section].w++; }

                // Visual Feedback
                const bubbles = document.querySelectorAll(`[data-q="${qNum}"] .bubble`);
                bubbles.forEach(btn => {
                    const val = parseInt(btn.innerText);
                    if(ans === val) btn.style.backgroundColor = (ans === correct) ? "#10b981" : "#ef4444";
                    else if(val === correct && ans !== null) btn.style.border = "2px dashed #10b981";
                });
            });

            document.getElementById('resP').innerText = (ANALYSIS.phy.c * 4) - ANALYSIS.phy.w;
            document.getElementById('resC').innerText = (ANALYSIS.chem.c * 4) - ANALYSIS.chem.w;
            document.getElementById('resB').innerText = (ANALYSIS.bio.c * 4) - ANALYSIS.bio.w;
            document.getElementById('resTotal').innerText = (ANALYSIS.phy.c + ANALYSIS.chem.c + ANALYSIS.bio.c) * 4 - (ANALYSIS.phy.w + ANALYSIS.chem.w + ANALYSIS.bio.w);
        }

        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'pt', 'a4');
            const name = (document.getElementById('userName').value || "STUDENT").toUpperCase();
            
            // Header
            doc.setFillColor(15, 23, 42); doc.rect(0, 0, 600, 100, 'F');
            doc.setTextColor(255, 255, 255); doc.setFontSize(26); doc.text("NEET STRIDE FORENSIC AUDIT", 40, 55);
            doc.setFontSize(10); doc.text(`CANDIDATE: ${name} | GRAND TOTAL: ${document.getElementById('resTotal').innerText}/720`, 40, 80);

            // Analysis Section
            let y = 130;
            doc.setTextColor(30, 41, 59); doc.setFontSize(16); doc.text("SUBJECT-WISE ANALYSIS", 40, y);
            y += 25;

            const sections = [
                {n: "PHYSICS", a: ANALYSIS.phy, s: document.getElementById('resP').innerText},
                {n: "CHEMISTRY", a: ANALYSIS.chem, s: document.getElementById('resC').innerText},
                {n: "BIOLOGY", a: ANALYSIS.bio, s: document.getElementById('resB').innerText}
            ];

            sections.forEach(s => {
                doc.setFillColor(241, 245, 249); doc.roundedRect(40, y, 515, 50, 8, 8, 'F');
                doc.setTextColor(71, 85, 105); doc.setFontSize(11);
                doc.text(s.n, 55, y + 20);
                doc.text(`Score: ${s.s}`, 55, y + 38);
                doc.text(`Correct: ${s.a.c}`, 200, y + 30);
                doc.text(`Wrong: ${s.a.w}`, 300, y + 30);
                doc.text(`Skipped: ${s.a.u}`, 400, y + 30);
                y += 65;
            });

            // OMR Visual Map
            doc.setFontSize(14); doc.text("OMR RECONSTRUCTION MAP", 40, y+10);
            let sX = 40, sY = y + 50, colW = 130, rowH = 12;
            for(let i=0; i<180; i++){
                let col = Math.floor(i/45), row = i%45;
                let x = sX + (col*colW), yp = sY + (row*rowH);
                doc.setFontSize(6); doc.setTextColor(180); doc.text(`${i+1}`, x, yp);
                for(let b=1; b<=4; b++){
                    let bx = x+20+(b*18), by = yp-2;
                    if(STUDENT_ANS[i] == b) {
                        doc.setFillColor(STUDENT_ANS[i] == MASTER_KEY[i] ? 16 : 239, STUDENT_ANS[i] == MASTER_KEY[i] ? 185 : 68, STUDENT_ANS[i] == MASTER_KEY[i] ? 129 : 68);
                        doc.circle(bx, by, 4, 'F');
                    } else if(MASTER_KEY[i] == b && STUDENT_ANS[i] !== null) {
                        doc.setDrawColor(16, 185, 129); doc.circle(bx, by, 4, 'D');
                    } else {
                        doc.setDrawColor(220); doc.circle(bx, by, 4, 'D');
                    }
                }
            }
            doc.save(`NEET_AUDIT_${name}.pdf`);
        }

        function startTimer() {
            let t = 10800;
            setInterval(() => { if(!IS_LOCKED) { t--; let h=Math.floor(t/3600), m=Math.floor((t%3600)/60), s=t%60; document.getElementById('timer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }}, 1000);
        }

        window.onload = () => { buildSection('phyGrid', 1, 45); buildSection('chemGrid', 46, 90); buildSection('bioGrid', 91, 180); startTimer(); };
    </script>
</body>
</html>
