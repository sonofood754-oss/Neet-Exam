<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEET STRIDE PRO | Forensic Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap');
        body { background: #0f172a; color: #f8fafc; font-family: 'Outfit', sans-serif; }
        
        /* Traditional OMR Grid Styling */
        .omr-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (max-width: 1024px) {
            .omr-container { grid-template-columns: 1fr; }
        }

        .omr-card {
            background: rgba(30, 41, 59, 0.5);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }

        .omr-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .omr-row:hover { background: rgba(255,255,255,0.05); }

        .bubble {
            width: 30px;
            height: 30px;
            border: 1.5px solid #475569;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .bubble.selected {
            background: #6366f1;
            border-color: #818cf8;
            color: white;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.4);
        }

        .q-num { font-size: 11px; color: #94a3b8; width: 25px; font-weight: 800; }
        
        /* Sticky Footer for Score */
        .score-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #020617;
            border-top: 2px solid #6366f1;
            padding: 20px;
            z-index: 100;
            transform: translateY(100%);
            transition: 0.5s ease-out;
        }
        .score-bar.active { transform: translateY(0); }
    </style>
</head>
<body class="p-4 pb-32">

    <header class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center mb-10">
        <div>
            <h1 class="text-4xl font-black italic tracking-tighter text-indigo-400">STRIDE<span class="text-white">PRO</span></h1>
            <p class="text-xs text-slate-500 font-bold uppercase tracking-widest">Typical OMR Forensic Layout</p>
        </div>
        <div class="bg-slate-800 px-6 py-2 rounded-full font-mono text-2xl" id="timer">03:00:00</div>
    </header>

    <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
        <input type="text" id="userName" placeholder="Candidate Name" class="bg-slate-900 border border-slate-700 p-4 rounded-xl outline-none focus:border-indigo-500">
        <textarea id="masterKey" placeholder="Paste 180 Digit Key..." class="bg-slate-900 border border-slate-700 p-4 rounded-xl h-14 resize-none"></textarea>
        <div class="flex gap-2">
            <button onclick="syncKey()" class="flex-1 bg-indigo-600 font-bold rounded-xl uppercase text-xs">Sync Key</button>
            <button id="finalBtn" onclick="finishExam()" class="hidden flex-1 bg-emerald-600 font-bold rounded-xl uppercase text-xs">Finish</button>
            <button id="pdfBtn" onclick="downloadPDF()" class="hidden flex-1 bg-white text-black font-bold rounded-xl uppercase text-xs">Report</button>
        </div>
    </div>

    <div class="omr-container">
        <div class="omr-card">
            <div class="bg-indigo-900/30 p-3 font-bold text-center border-b border-indigo-500/20 text-indigo-300">PHYSICS (1-45)</div>
            <div id="grid-phy" class="h-[600px] overflow-y-auto"></div>
        </div>
        <div class="omr-card">
            <div class="bg-emerald-900/30 p-3 font-bold text-center border-b border-emerald-500/20 text-emerald-300">CHEMISTRY (46-90)</div>
            <div id="grid-chem" class="h-[600px] overflow-y-auto"></div>
        </div>
        <div class="omr-card">
            <div class="bg-rose-900/30 p-3 font-bold text-center border-b border-rose-500/20 text-rose-300">BIOLOGY (91-180)</div>
            <div id="grid-bio" class="h-[600px] overflow-y-auto"></div>
        </div>
    </div>

    <div id="scoreHud" class="score-bar">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex gap-10">
                <div class="text-center"><p class="text-[10px] text-slate-500">PHY</p><p id="s-p" class="text-2xl font-black">0</p></div>
                <div class="text-center"><p class="text-[10px] text-slate-500">CHE</p><p id="s-c" class="text-2xl font-black">0</p></div>
                <div class="text-center"><p class="text-[10px] text-slate-500">BIO</p><p id="s-b" class="text-2xl font-black">0</p></div>
            </div>
            <div class="text-right">
                <p class="text-xs text-indigo-400 font-bold uppercase">Total Score</p>
                <h2 class="text-5xl font-black italic" id="s-total">0<span class="text-xl not-italic text-slate-600">/720</span></h2>
            </div>
        </div>
    </div>

    <script>
        let MASTER = [];
        let STUDENT = new Array(180).fill(null);
        let LOCKED = false;
        let STATS = { phy: {c:0, w:0, u:0, listW:[]}, chem: {c:0, w:0, u:0, listW:[]}, bio: {c:0, w:0, u:0, listW:[]} };

        function init() {
            renderSection('grid-phy', 1, 45);
            renderSection('grid-chem', 46, 90);
            renderSection('grid-bio', 91, 180);
            startTimer();
        }

        function renderSection(host, start, end) {
            const el = document.getElementById(host);
            for(let i=start; i<=end; i++) {
                el.innerHTML += `
                    <div class="omr-row">
                        <span class="q-num">${i}</span>
                        <div class="flex gap-2" data-q="${i}">
                            ${[1,2,3,4].map(n => `<div class="bubble" onclick="tap(${i}, ${n}, this)">${n}</div>`).join('')}
                        </div>
                    </div>`;
            }
        }

        function tap(q, v, el) {
            if(LOCKED) return;
            const row = el.parentElement;
            row.querySelectorAll('.bubble').forEach(b => b.classList.remove('selected'));
            if(STUDENT[q-1] === v) { STUDENT[q-1] = null; }
            else { STUDENT[q-1] = v; el.classList.add('selected'); }
        }

        function syncKey() {
            const raw = document.getElementById('masterKey').value;
            MASTER = raw.match(/[1-4]/g) || [];
            if(MASTER.length < 180) return alert("Enter 180 digits!");
            document.getElementById('finalBtn').classList.remove('hidden');
            alert("Key Synced Successfully");
        }

        function finishExam() {
            if(!confirm("Submit Exam?")) return;
            LOCKED = true;
            document.getElementById('finalBtn').classList.add('hidden');
            document.getElementById('pdfBtn').classList.remove('hidden');
            document.getElementById('scoreHud').classList.add('active');

            STUDENT.forEach((ans, i) => {
                const cor = parseInt(MASTER[i]);
                const q = i + 1;
                let s = q <= 45 ? 'phy' : (q <= 90 ? 'chem' : 'bio');
                
                if(ans === null) { STATS[s].u++; }
                else if(ans === cor) { STATS[s].c++; }
                else { STATS[s].w++; STATS[s].listW.push(q); }

                // Visual Feedback
                const bubbles = document.querySelectorAll(`[data-q="${q}"] .bubble`);
                bubbles.forEach(b => {
                    const val = parseInt(b.innerText);
                    if(val === ans) b.style.background = (ans === cor) ? "#10b981" : "#ef4444";
                    if(val === cor && ans !== null) b.style.border = "2px dashed #10b981";
                });
            });

            const pM = (STATS.phy.c * 4) - STATS.phy.w;
            const cM = (STATS.chem.c * 4) - STATS.chem.w;
            const bM = (STATS.bio.c * 4) - STATS.bio.w;
            document.getElementById('s-p').innerText = pM;
            document.getElementById('s-c').innerText = cM;
            document.getElementById('s-b').innerText = bM;
            document.getElementById('s-total').innerText = pM + cM + bM;
        }

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'pt', 'a4');
            const name = document.getElementById('userName').value || "STUDENT";

            doc.setFillColor(15, 23, 42); doc.rect(0, 0, 600, 80, 'F');
            doc.setTextColor(255); doc.setFontSize(22); doc.text("NEET STRIDE FORENSIC REPORT", 40, 45);
            doc.setFontSize(10); doc.text(`CANDIDATE: ${name.toUpperCase()}`, 40, 65);

            let y = 120;
            const results = [
                {t: "PHYSICS", d: STATS.phy, m: document.getElementById('s-p').innerText},
                {t: "CHEMISTRY", d: STATS.chem, m: document.getElementById('s-c').innerText},
                {t: "BIOLOGY", d: STATS.bio, m: document.getElementById('s-b').innerText}
            ];

            results.forEach(res => {
                doc.setFillColor(240); doc.roundedRect(40, y, 515, 60, 5, 5, 'F');
                doc.setTextColor(30); doc.setFontSize(12); doc.text(res.t, 55, y+20);
                doc.setFontSize(9); doc.text(`Marks: ${res.m}  |  Correct: ${res.d.c}  |  Wrong: ${res.d.w}  |  Left: ${res.d.u}`, 55, y+40);
                doc.text(`Error List: ${res.d.listW.join(', ') || 'None'}`, 55, y+53, {maxWidth: 480});
                y += 75;
            });

            // OMR Map
            doc.setFontSize(14); doc.text("OMR VISUAL RECONSTRUCTION", 40, y+20);
            let sx = 40, sy = y + 50;
            for(let i=0; i<180; i++) {
                let col = Math.floor(i/45), row = i%45;
                let x = sx + (col*130), yp = sy + (row*11);
                doc.setFontSize(6); doc.setTextColor(150); doc.text(`${i+1}`, x, yp);
                for(let b=1; b<=4; b++) {
                    let bx = x+20+(b*18), by = yp-2;
                    if(STUDENT[i] == b) {
                        doc.setFillColor(STUDENT[i] == MASTER[i] ? 16 : 239, STUDENT[i] == MASTER[i] ? 185 : 68, STUDENT[i] == MASTER_KEY[i] ? 129 : 68);
                        doc.circle(bx, by, 3.5, 'F');
                    } else if(MASTER[i] == b && STUDENT[i] !== null) {
                        doc.setDrawColor(16, 185, 129); doc.circle(bx, by, 3.5, 'D');
                    } else {
                        doc.setDrawColor(200); doc.circle(bx, by, 3.5, 'D');
                    }
                }
            }
            doc.save(`NEET_Report_${name}.pdf`);
        }

        function startTimer() {
            let s = 10800;
            setInterval(() => {
                if(LOCKED) return;
                s--;
                let h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
                document.getElementById('timer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
            }, 1000);
        }

        init();
    </script>
</body>
</html>
