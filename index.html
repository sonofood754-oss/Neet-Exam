<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEET STRIDE PRO | Forensic Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap');
        body { background: radial-gradient(circle at top right, #1e293b, #070b14); color: #f8fafc; font-family: 'Outfit', sans-serif; overflow-x: hidden; }
        .glass-panel { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 1.5rem; }
        .bubble { width: 34px; height: 34px; border: 1.5px solid #334155; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; font-weight: 700; font-size: 0.75rem; border-radius: 10px; background: rgba(15, 23, 42, 0.6); }
        .bubble.selected { background: linear-gradient(135deg, #6366f1, #4338ca); border-color: #818cf8; box-shadow: 0 0 15px rgba(99, 102, 241, 0.6); color: white; transform: scale(1.05); }
        .omr-grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; width: 100%; }
        @media (max-width: 1100px) { .omr-grid-container { grid-template-columns: 1fr; } }
        .section-header { background: linear-gradient(90deg, rgba(99,102,241,0.2), transparent); padding: 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
    </style>
</head>
<body class="p-4 lg:p-10">

    <header class="max-w-[1600px] mx-auto mb-8 flex flex-col md:flex-row justify-between items-center gap-6">
        <div>
            <h1 class="text-5xl font-black tracking-tighter italic text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400">STRIDE<span class="text-white">PRO</span></h1>
            <p class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.5em] mt-1">Forensic Audit Engine v4.2</p>
        </div>
        <div class="glass-panel px-8 py-3"><p id="timer" class="text-3xl font-black font-mono text-indigo-400">03:00:00</p></div>
    </header>

    <main class="max-w-[1600px] mx-auto space-y-6">
        <section class="grid grid-cols-1 lg:grid-cols-4 gap-4">
            <div class="glass-panel p-5"><input type="text" id="userName" placeholder="Student Name" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-3 outline-none focus:border-indigo-500 text-white font-bold"></div>
            <div class="glass-panel p-5 lg:col-span-2 flex gap-3">
                <textarea id="masterKey" class="w-full h-12 bg-slate-900/50 border border-slate-700 rounded-xl p-3 font-mono text-xs resize-none outline-none focus:border-indigo-500" placeholder="Paste 180 digits..."></textarea>
                <button onclick="syncEngine()" class="bg-indigo-600 px-6 rounded-xl font-black text-xs uppercase tracking-widest hover:bg-indigo-500 transition-all">Sync</button>
            </div>
            <div class="glass-panel p-5 flex items-center justify-center">
                <div id="actionArea" class="hidden w-full"><button onclick="calculateScore()" class="w-full bg-emerald-600 py-3 rounded-xl font-black text-sm uppercase tracking-widest">Analyze</button></div>
                <div id="pdfArea" class="hidden w-full"><button onclick="generatePDF()" class="w-full bg-white text-slate-900 py-3 rounded-xl font-black text-sm uppercase tracking-widest">Download Audit</button></div>
            </div>
        </section>

        <section class="omr-grid-container">
            <div class="glass-panel overflow-hidden"><div class="section-header"><h3 class="font-black text-xs uppercase tracking-widest text-indigo-300">Physics</h3></div><div id="phyGrid" class="p-4 space-y-2 h-[550px] overflow-y-auto"></div></div>
            <div class="glass-panel overflow-hidden"><div class="section-header"><h3 class="font-black text-xs uppercase tracking-widest text-emerald-300">Chemistry</h3></div><div id="chemGrid" class="p-4 space-y-2 h-[550px] overflow-y-auto"></div></div>
            <div class="glass-panel overflow-hidden"><div class="section-header"><h3 class="font-black text-xs uppercase tracking-widest text-rose-300">Biology</h3></div><div id="bioGrid" class="p-4 space-y-2 h-[550px] overflow-y-auto"></div></div>
        </section>
    </main>

    <div id="scoreHud" class="fixed bottom-0 left-0 right-0 bg-slate-950/95 backdrop-blur-3xl border-t border-white/10 p-6 translate-y-full transition-transform duration-700 z-[1000]">
        <div class="max-w-[1600px] mx-auto flex justify-between items-center">
            <div class="flex gap-8">
                <div class="text-center"><p class="text-[10px] text-slate-500 font-bold">PHY</p><p id="resP" class="text-2xl font-black">0</p></div>
                <div class="text-center"><p class="text-[10px] text-slate-500 font-bold">CHE</p><p id="resC" class="text-2xl font-black">0</p></div>
                <div class="text-center"><p class="text-[10px] text-slate-500 font-bold">BIO</p><p id="resB" class="text-2xl font-black">0</p></div>
            </div>
            <div class="text-right"><span id="resTotal" class="text-6xl font-black italic">0</span><span class="text-indigo-500 font-black text-xl">/720</span></div>
        </div>
    </div>

    <script>
        let MASTER_KEY = [];
        let STUDENT_ANS = new Array(180).fill(null);
        let IS_LOCKED = false;
        let ANALYSIS = {
            phy: { c: 0, w: 0, u: 0, listW: [], listU: [] },
            chem: { c: 0, w: 0, u: 0, listW: [], listU: [] },
            bio: { c: 0, w: 0, u: 0, listW: [], listU: [] }
        };

        function buildSection(id, s, e) {
            const container = document.getElementById(id);
            for(let i = s; i <= e; i++) {
                container.innerHTML += `<div class="flex items-center justify-between py-1.5 px-2 hover:bg-white/5 rounded-lg">
                    <span class="text-[10px] font-bold text-slate-500 w-6">${i}</span>
                    <div class="flex gap-1.5" data-q="${i}">
                        ${[1,2,3,4].map(n => `<div onclick="selectBubble(${i}, ${n}, this)" class="bubble">${n}</div>`).join('')}
                    </div></div>`;
            }
        }

        function selectBubble(q, v, el) {
            if(IS_LOCKED) return;
            el.parentElement.querySelectorAll('.bubble').forEach(b => b.classList.remove('selected'));
            if(STUDENT_ANS[q-1] === v) { STUDENT_ANS[q-1] = null; }
            else { STUDENT_ANS[q-1] = v; el.classList.add('selected'); }
        }

        function syncEngine() {
            const val = document.getElementById('masterKey').value;
            MASTER_KEY = val.match(/[1-4]/g) || [];
            if(MASTER_KEY.length >= 180) {
                document.getElementById('actionArea').classList.remove('hidden');
                alert("Forensic Key Synchronized.");
            } else { alert("Error: 180 digits required."); }
        }

        function calculateScore() {
            if(!confirm("Finalize responses?")) return;
            IS_LOCKED = true;
            document.getElementById('actionArea').classList.add('hidden');
            document.getElementById('pdfArea').classList.remove('hidden');
            document.getElementById('scoreHud').classList.remove('translate-y-full');

            ANALYSIS = { phy: {c:0, w:0, u:0, listW:[], listU:[]}, chem: {c:0, w:0, u:0, listW:[], listU:[]}, bio: {c:0, w:0, u:0, listW:[], listU:[]} };

            STUDENT_ANS.forEach((ans, i) => {
                const correct = parseInt(MASTER_KEY[i]);
                const q = i + 1;
                let s = q <= 45 ? 'phy' : (q <= 90 ? 'chem' : 'bio');
                
                if(ans === null) { ANALYSIS[s].u++; ANALYSIS[s].listU.push(q); }
                else if(ans === correct) { ANALYSIS[s].c++; }
                else { ANALYSIS[s].w++; ANALYSIS[s].listW.push(q); }

                const bubbles = document.querySelectorAll(`[data-q="${q}"] .bubble`);
                bubbles.forEach(btn => {
                    if(parseInt(btn.innerText) === ans) btn.style.backgroundColor = (ans === correct) ? "#10b981" : "#ef4444";
                    else if(parseInt(btn.innerText) === correct && ans !== null) btn.style.border = "2px dashed #10b981";
                });
            });

            document.getElementById('resP').innerText = (ANALYSIS.phy.c * 4) - ANALYSIS.phy.w;
            document.getElementById('resC').innerText = (ANALYSIS.chem.c * 4) - ANALYSIS.chem.w;
            document.getElementById('resB').innerText = (ANALYSIS.bio.c * 4) - ANALYSIS.bio.w;
            document.getElementById('resTotal').innerText = (ANALYSIS.phy.c + ANALYSIS.chem.c + ANALYSIS.bio.c) * 4 - (ANALYSIS.phy.w + ANALYSIS.chem.w + ANALYSIS.bio.w);
        }

        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'pt', 'a4');
            const name = (document.getElementById('userName').value || "STUDENT").toUpperCase();
            
            doc.setFillColor(15, 23, 42); doc.rect(0, 0, 600, 100, 'F');
            doc.setTextColor(255, 255, 255); doc.setFontSize(24); doc.text("NEET STRIDE FORENSIC AUDIT", 40, 50);
            doc.setFontSize(10); doc.text(`CANDIDATE: ${name} | SCORE: ${document.getElementById('resTotal').innerText}/720`, 40, 75);

            let y = 140;
            const sections = [ {n: "PHYSICS", a: ANALYSIS.phy}, {n: "CHEMISTRY", a: ANALYSIS.chem}, {n: "BIOLOGY", a: ANALYSIS.bio} ];

            sections.forEach(s => {
                doc.setFillColor(245, 247, 250); doc.roundedRect(40, y, 515, 85, 5, 5, 'F');
                doc.setTextColor(30, 41, 59); doc.setFontSize(12); doc.text(s.n, 55, y + 20);
                doc.setFontSize(9); doc.setTextColor(71, 85, 105);
                doc.text(`Correct: ${s.a.c} | Wrong: ${s.a.w} | Unattempted: ${s.a.u}`, 55, y + 40);
                doc.text(`WRONG QUESTIONS: ${s.a.listW.join(', ') || 'None'}`, 55, y + 55, {maxWidth: 480});
                doc.text(`SKIPPED QUESTIONS: ${s.a.listU.join(', ') || 'None'}`, 55, y + 75, {maxWidth: 480});
                y += 100;
            });

            doc.setFontSize(14); doc.setTextColor(30); doc.text("OMR RECONSTRUCTION", 40, y + 20);
            let sX = 40, sY = y + 50;
            for(let i=0; i<180; i++){
                let col = Math.floor(i/45), row = i%45;
                let x = sX + (col*130), yp = sY + (row*12);
                doc.setFontSize(6); doc.setTextColor(180); doc.text(`${i+1}`, x, yp);
                for(let b=1; b<=4; b++){
                    let bx = x+20+(b*18), by = yp-2;
                    if(STUDENT_ANS[i] == b) {
                        doc.setFillColor(STUDENT_ANS[i] == MASTER_KEY[i] ? 16 : 239, STUDENT_ANS[i] == MASTER_KEY[i] ? 185 : 68, STUDENT_ANS[i] == MASTER_KEY[i] ? 129 : 68);
                        doc.circle(bx, by, 4, 'F');
                    } else if(MASTER_KEY[i] == b && STUDENT_ANS[i] !== null) {
                        doc.setDrawColor(16, 185, 129); doc.circle(bx, by, 4, 'D');
                    } else {
                        doc.setDrawColor(220); doc.circle(bx, by, 4, 'D');
                    }
                }
            }
            doc.save(`NEET_AUDIT_${name}.pdf`);
        }

        window.onload = () => { buildSection('phyGrid', 1, 45); buildSection('chemGrid', 46, 90); buildSection('bioGrid', 91, 180); 
            let t = 10800; setInterval(() => { if(!IS_LOCKED) { t--; let h=Math.floor(t/3600), m=Math.floor((t%3600)/60), s=t%60; document.getElementById('timer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }}, 1000);
        };
    </script>
</body>
</html>
