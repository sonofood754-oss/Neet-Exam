<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STRIDEPRO | Forensic Audit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap');
        body { background: #080a0f; color: #f8fafc; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        .omr-master-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-width: 100%;
        }

        @media (max-width: 1024px) { .omr-master-container { grid-template-columns: repeat(4, 1fr); } }

        .omr-column { background: rgba(30, 41, 59, 0.2); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 6px; }

        .omr-row {
            display: flex;
            align-items: center;
            padding: 4px 6px;
            margin-bottom: 2px;
            background: rgba(15, 23, 42, 0.4);
            border-radius: 8px;
        }

        /* Large Square Haptic Bubbles */
        .bubble {
            width: 30px;
            height: 30px;
            border: 2px solid #334155;
            background: rgba(15, 23, 42, 0.6);
            color: #94a3b8;
            font-weight: 800;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            margin-left: 5px;
            cursor: pointer;
            transition: all 0.1s;
        }

        .bubble.selected {
            background: #6366f1;
            border-color: #818cf8;
            color: white;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
        }

        .q-tag { font-size: 10px; font-weight: 900; color: #64748b; width: 22px; text-align: right; margin-right: 5px; }
        
        .header-hud {
            position: sticky;
            top: 0; z-index: 100;
            background: rgba(8, 10, 15, 0.95);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body class="pb-10">

    <div class="header-hud flex justify-between items-center">
        <h1 class="text-2xl font-black italic text-indigo-500">STRIDE<span class="text-white">PRO</span></h1>
        <div class="flex items-center gap-3">
            <div id="timer" class="font-mono text-lg bg-slate-900 px-3 py-1 rounded border border-slate-700">03:00:00</div>
            <button onclick="calculate()" id="submitBtn" class="hidden bg-emerald-600 px-4 py-2 rounded-lg font-bold text-[10px] uppercase">Submit</button>
            <button onclick="generatePDF()" id="pdfBtn" class="hidden bg-white text-black px-4 py-2 rounded-lg font-bold text-[10px] uppercase">Download Report</button>
        </div>
    </div>

    <main class="p-4 space-y-4">
        <div class="flex flex-col md:flex-row gap-3">
            <input type="text" id="studentName" placeholder="Candidate Name" class="bg-slate-900 border border-slate-800 p-3 rounded-xl outline-none text-white font-bold w-full md:w-1/4">
            <div class="flex flex-1 gap-2">
                <input type="text" id="keyInput" placeholder="180 Digit Key" class="flex-1 bg-slate-900 border border-slate-800 p-3 rounded-xl outline-none font-mono text-xs text-indigo-300">
                <button onclick="sync()" class="bg-indigo-600 px-6 rounded-xl font-bold text-xs uppercase">Sync</button>
            </div>
        </div>

        <div class="omr-master-container" id="gridMain">
            <div class="omr-column"><div class="text-[9px] font-black text-center mb-1 text-indigo-400">PHY (1-45)</div><div id="col-1"></div></div>
            <div class="omr-column"><div class="text-[9px] font-black text-center mb-1 text-emerald-400">CHE (46-90)</div><div id="col-2"></div></div>
            <div class="omr-column"><div class="text-[9px] font-black text-center mb-1 text-rose-400">BIO (91-135)</div><div id="col-3"></div></div>
            <div class="omr-column"><div class="text-[9px] font-black text-center mb-1 text-rose-400">BIO (136-180)</div><div id="col-4"></div></div>
        </div>
    </main>

    <script>
        let MASTER = [];
        let STUDENT = new Array(180).fill(null);
        let LOCKED = false;

        function init() {
            render(1, 45, 'col-1'); render(46, 90, 'col-2');
            render(91, 135, 'col-3'); render(136, 180, 'col-4');
            startClock();
        }

        function render(s, e, id) {
            const el = document.getElementById(id);
            for(let i=s; i<=e; i++) {
                el.innerHTML += `<div class="omr-row"><span class="q-tag">${i}</span><div class="flex" data-q="${i}">${[1,2,3,4].map(n => `<div class="bubble" onclick="mark(${i},${n},this)">${n}</div>`).join('')}</div></div>`;
            }
        }

        function mark(q, v, el) {
            if(LOCKED) return;
            el.parentElement.querySelectorAll('.bubble').forEach(b => b.classList.remove('selected'));
            if(STUDENT[q-1] === v) STUDENT[q-1] = null;
            else { STUDENT[q-1] = v; el.classList.add('selected'); }
        }

        function sync() {
            MASTER = document.getElementById('keyInput').value.match(/[1-4]/g) || [];
            if(MASTER.length >= 180) {
                document.getElementById('submitBtn').classList.remove('hidden');
                alert("Key Ready.");
            }
        }

        function calculate() {
            if(!confirm("Submit Exam?")) return;
            LOCKED = true;
            document.getElementById('submitBtn').classList.add('hidden');
            document.getElementById('pdfBtn').classList.remove('hidden');
            STUDENT.forEach((ans, i) => {
                const cor = parseInt(MASTER[i]);
                const bubbles = document.querySelectorAll(`[data-q="${i+1}"] .bubble`);
                bubbles.forEach(b => {
                    const val = parseInt(b.innerText);
                    if(val === ans) b.style.background = (ans === cor) ? "#10b981" : "#ef4444";
                    if(val === cor && ans !== null) b.style.border = "2px dashed #10b981";
                });
            });
        }

        async function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'pt', 'a4');
            const name = (document.getElementById('studentName').value || "STUDENT").toUpperCase();
            
            doc.setFillColor(15, 23, 42); doc.rect(0, 0, 600, 70, 'F');
            doc.setTextColor(255); doc.setFontSize(20); doc.text("STRIDEPRO PERFORMANCE AUDIT", 40, 45);

            let y = 100;
            const sections = [
                {n: "PHYSICS (1-45)", s: 0, e: 44}, {n: "CHEMISTRY (46-90)", s: 45, e: 89}, {n: "BIOLOGY (91-180)", s: 90, e: 179}
            ];

            sections.forEach(sec => {
                let c=0, w=0, u=[];
                for(let i=sec.s; i<=sec.e; i++) {
                    if(STUDENT[i] === null) u.push(i+1);
                    else if(STUDENT[i] == MASTER[i]) c++;
                    else w++;
                }
                doc.setFillColor(245); doc.roundedRect(40, y, 515, 60, 5, 5, 'F');
                doc.setTextColor(40); doc.setFontSize(11); doc.text(sec.n, 50, y+20);
                doc.setFontSize(9); doc.setTextColor(80);
                doc.text(`Score: ${c*4-w} | Correct: ${c} | Wrong: ${w}`, 50, y+35);
                
                // HIGHLIGHT UNATTENDED
                doc.setTextColor(200, 0, 0); doc.setFont("helvetica", "bold");
                doc.text(`Unattended Qs: ${u.join(', ') || 'NONE'}`, 50, y+50, {maxWidth: 480});
                doc.setFont("helvetica", "normal");
                y += 75;
            });

            let sx=40, sy=y+20;
            for(let i=0; i<180; i++) {
                let col = Math.floor(i/45), row = i%45, x = sx+(col*135), yp = sy+(row*11);
                doc.setFontSize(5); 
                doc.setTextColor(STUDENT[i] === null ? [255, 0, 0] : [150, 150, 150]);
                doc.text(`${i+1}`, x, yp);
                for(let b=1; b<=4; b++) {
                    let bx = x+20+(b*18), by = yp-2;
                    if(STUDENT[i] == b) {
                        doc.setFillColor(STUDENT[i] == MASTER[i] ? [16, 185, 129] : [239, 68, 68]);
                        doc.circle(bx, by, 3.5, 'F');
                    } else { doc.setDrawColor(220); doc.circle(bx, by, 3.5, 'D'); }
                }
            }

            // MOBILE-SAFE DOWNLOAD (Blob fallback)
            const blob = doc.output('blob');
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `STRIDE_REPORT_${name}.pdf`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            // Fallback for strict browsers
            setTimeout(() => { if(!link.parentNode) window.open(url); }, 500);
        }

        function startClock() {
            let s = 10800;
            setInterval(() => { if(!LOCKED) { s--; let h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sc=s%60; document.getElementById('timer').innerText = `${h}:${m}:${sc}`; }}, 1000);
        }
        init();
    </script>
</body>
</html>
