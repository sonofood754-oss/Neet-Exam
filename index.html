<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEET STRIDE PRO | Forensic Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #4f46e5; --success: #10b981; --danger: #f43f5e; }
        body { -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; background-color: #f8fafc; }
        .omr-bubble { transition: all 0.1s ease; border-radius: 0.75rem; }
        .glass-morphism { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); border-top: 2px solid #4f46e5; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body>

    <div id="startOverlay" class="fixed inset-0 z-[1000] bg-slate-900 flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] p-10 max-w-lg w-full shadow-2xl text-center animate-fade">
            <div class="w-20 h-20 bg-indigo-50 rounded-3xl flex items-center justify-center mx-auto mb-6">
                <span class="text-4xl">🔬</span>
            </div>
            <h1 class="text-3xl font-black text-slate-800 mb-2">NEET STRIDE <span class="text-indigo-600">PRO</span></h1>
            <p class="text-slate-500 mb-8 text-sm font-medium">Forensic Evaluation Engine v3.0<br>Visual OMR Reconstruction & Analytics</p>
            <button id="launchBtn" onclick="launchApp()" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-bold text-xl hover:bg-indigo-700 shadow-xl active:scale-95 transition-all">INITIALIZE EXAM</button>
        </div>
    </div>

    <nav class="sticky top-0 z-50 bg-slate-900 text-white p-4 shadow-xl flex justify-between items-center">
        <div class="flex flex-col">
            <span class="text-[10px] uppercase tracking-widest text-indigo-400 font-bold">Forensic Live Mode</span>
            <span id="timerDisplay" class="font-mono text-2xl font-bold">03:00:00</span>
        </div>
        <button onclick="window.location.reload()" class="bg-rose-500/10 text-rose-400 p-2 rounded-xl text-xs px-4 border border-rose-500/20 font-bold">RESET</button>
    </nav>

    <main class="max-w-7xl mx-auto p-4 pt-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-12">
            <div class="lg:col-span-2 space-y-4">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Candidate Identity</label>
                    <input type="text" id="nameInp" placeholder="Enter Full Name" class="w-full text-xl font-bold outline-none border-b-2 border-slate-100 focus:border-indigo-500 transition-colors py-2">
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <div class="flex justify-between items-center mb-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase">Answer Key Engine</label>
                        <span id="keyStatus" class="text-[10px] font-bold text-rose-500">KEY NOT LOADED</span>
                    </div>
                    <textarea id="keyInp" class="w-full h-20 bg-slate-50 rounded-2xl p-4 text-xs font-mono border-none focus:ring-2 focus:ring-indigo-500" placeholder="Paste 180 digits (1-4 only)..."></textarea>
                    <button onclick="lockKey()" id="lockBtn" class="mt-4 w-full bg-slate-800 text-white py-4 rounded-xl font-bold text-sm tracking-widest shadow-lg active:scale-95 transition-all">LOCK SYSTEM DATA</button>
                </div>
            </div>

            <div class="bg-indigo-600 rounded-[2.5rem] p-8 text-white flex flex-col justify-center shadow-2xl shadow-indigo-200 relative overflow-hidden">
                <h3 class="text-3xl font-black mb-2 relative z-10">Submit</h3>
                <p class="text-indigo-100 text-sm mb-6 relative z-10">Run forensic audit on 180 responses.</p>
                <button onclick="processFinal()" id="finalSubmit" class="w-full bg-white text-indigo-600 py-5 rounded-2xl font-black text-lg shadow-xl active:scale-95 transition-all relative z-10">EVALUATE NOW</button>
                <button onclick="exportPDF()" id="pdfBtn" style="display:none" class="w-full bg-emerald-500 text-white py-5 rounded-2xl font-black text-lg shadow-xl flex items-center justify-center gap-2 relative z-10">📥 DOWNLOAD ANALYSIS</button>
                <div class="absolute -right-6 -bottom-6 text-9xl opacity-10 font-black italic">720</div>
            </div>
        </div>

        <div id="omrContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 opacity-0 transition-opacity duration-700">
            </div>
    </main>

    <div id="resBar" class="fixed bottom-0 left-0 right-0 glass-morphism p-8 translate-y-full transition-transform duration-500 z-[100] rounded-t-[3rem] shadow-2xl">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
            <div class="grid grid-cols-3 gap-6 text-center w-full md:w-auto">
                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                    <p class="text-[10px] font-black text-slate-400 uppercase mb-1">Physics</p>
                    <p id="p_score" class="text-2xl font-black text-slate-800">0</p>
                </div>
                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                    <p class="text-[10px] font-black text-slate-400 uppercase mb-1">Chemistry</p>
                    <p id="c_score" class="text-2xl font-black text-slate-800">0</p>
                </div>
                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                    <p class="text-[10px] font-black text-slate-400 uppercase mb-1">Biology</p>
                    <p id="b_score" class="text-2xl font-black text-slate-800">0</p>
                </div>
            </div>
            <div class="text-center md:text-right">
                <p class="text-xs font-bold text-indigo-600 uppercase tracking-widest mb-1">Total Forensic Score</p>
                <div class="flex items-baseline justify-center md:justify-end gap-2">
                    <span id="total_score" class="text-7xl font-black text-slate-900 leading-none">0</span>
                    <span class="text-slate-300 font-black text-2xl">/720</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let KEY = [], ANS = new Array(180).fill(null), FINISHED = false;
        let SECONDS = 10800;

        // FAIL-SAFE: If grid fails to load, force clear cache
        window.onerror = function() {
            console.log("Error detected. Running fail-safe...");
            localStorage.clear();
        };

        function launchApp() {
            try {
                document.getElementById('startOverlay').style.display = 'none';
                initGrid();
                document.getElementById('omrContainer').classList.remove('opacity-0');
                
                const timer = setInterval(() => {
                    if(FINISHED || SECONDS <= 0) return clearInterval(timer);
                    SECONDS--;
                    let h=Math.floor(SECONDS/3600), m=Math.floor((SECONDS%3600)/60), s=SECONDS%60;
                    document.getElementById('timerDisplay').innerText = 
                        `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                }, 1000);
            } catch (err) {
                alert("Fail-Safe Triggered: Refreshing App...");
                window.location.reload();
            }
        }

        function initGrid() {
            const container = document.getElementById('omrContainer');
            const sections = [
                { name: "Physics", start: 1, end: 45 },
                { name: "Chemistry", start: 46, end: 90 },
                { name: "Biology I", start: 91, end: 135 },
                { name: "Biology II", start: 136, end: 180 }
            ];

            container.innerHTML = ''; // Clear any existing content
            sections.forEach(sec => {
                const wrap = document.createElement('div');
                wrap.className = "bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 space-y-3";
                wrap.innerHTML = `<h4 class="text-center font-black text-indigo-600 text-[10px] mb-6 uppercase tracking-[0.2em]">${sec.name}</h4>`;
                
                for(let i=sec.start; i<=sec.end; i++) {
                    const row = document.createElement('div');
                    row.className = "flex items-center justify-between group h-10";
                    row.innerHTML = `
                        <span class="text-[11px] font-black text-slate-300 w-6">${i}</span>
                        <div class="flex gap-1.5" data-q="${i}">
                            ${[1,2,3,4].map(n => `
                                <button onclick="handleBubble(${i},${n},this)" 
                                    class="omr-bubble w-9 h-9 border-2 border-slate-50 bg-slate-50 text-slate-400 font-black text-xs flex items-center justify-center active:scale-75">
                                    ${n}
                                </button>
                            `).join('')}
                        </div>
                    `;
                    wrap.appendChild(row);
                }
                container.appendChild(wrap);
            });
        }

        function handleBubble(q, v, btn) {
            if(FINISHED) return;
            const parent = btn.parentElement;
            const buttons = parent.querySelectorAll('button');
            
            if(ANS[q-1] === v) {
                ANS[q-1] = null;
                btn.className = "omr-bubble w-9 h-9 border-2 border-slate-50 bg-slate-50 text-slate-400 font-black text-xs flex items-center justify-center";
            } else {
                buttons.forEach(b => b.className = "omr-bubble w-9 h-9 border-2 border-slate-50 bg-slate-50 text-slate-400 font-black text-xs flex items-center justify-center");
                ANS[q-1] = v;
                btn.className = "omr-bubble w-9 h-9 border-2 border-indigo-600 bg-indigo-600 text-white font-black text-xs flex items-center justify-center shadow-lg shadow-indigo-100 scale-110";
            }
        }

        function lockKey() {
            const raw = document.getElementById('keyInp').value;
            KEY = raw.match(/[1-4]/g) || [];
            if(KEY.length >= 180) {
                document.getElementById('keyStatus').innerText = "✅ SYSTEM SYNCED";
                document.getElementById('keyStatus').className = "text-[10px] font-bold text-emerald-500";
                document.getElementById('lockBtn').className = "mt-4 w-full bg-emerald-500 text-white py-4 rounded-xl font-bold text-sm tracking-widest shadow-lg";
                alert("Master Data Locked. Forensic Engine Ready.");
            } else {
                alert(`Data Mismatch: System needs 180 digits. Found: ${KEY.length}`);
            }
        }

        function processFinal() {
            if(KEY.length < 180) return alert("Security Error: Please lock a 180-digit Master Key first.");
            FINISHED = true;
            
            document.getElementById('finalSubmit').style.display = 'none';
            document.getElementById('pdfBtn').style.display = 'flex';
            document.getElementById('resBar').classList.remove('translate-y-full');

            let p=0, c=0, b=0;
            ANS.forEach((val, i) => {
                let points = 0;
                if(val == KEY[i]) points = 4;
                else if(val !== null) points = -1;

                if(i < 45) p += points;
                else if(i < 90) c += points;
                else b += points;

                const bubbles = document.querySelectorAll(`[data-q="${i+1}"] button`);
                bubbles.forEach(btn => {
                    const bv = parseInt(btn.innerText);
                    if(val == bv) {
                        btn.style.background = (val == KEY[i]) ? '#10b981' : '#f43f5e';
                        btn.style.borderColor = (val == KEY[i]) ? '#10b981' : '#f43f5e';
                        btn.style.color = 'white';
                    } else if(bv == KEY[i] && val !== null) {
                        btn.style.borderColor = '#10b981';
                        btn.style.color = '#10b981';
                        btn.style.borderStyle = 'dashed';
                    }
                });
            });

            document.getElementById('p_score').innerText = p;
            document.getElementById('c_score').innerText = c;
            document.getElementById('b_score').innerText = b;
            document.getElementById('total_score').innerText = p+c+b;
        }

        async function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            const name = (document.getElementById('nameInp').value || "Candidate").toUpperCase();
            const score = document.getElementById('total_score').innerText;

            // Header Background
            doc.setFillColor(15, 23, 42); doc.rect(0, 0, 210, 45, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(24); doc.text("NEET FORENSIC ANALYSIS", 15, 22);
            doc.setFontSize(10); doc.text(`CANDIDATE: ${name}  |  GRAND TOTAL: ${score}/720`, 15, 33);

            // Table Header
            doc.setTextColor(15, 23, 42); doc.setFontSize(12); doc.text("Sectional Audit", 15, 55);
            doc.setDrawColor(226, 232, 240); doc.line(15, 57, 195, 57);

            const stats = [
                { s: "Physics", m: document.getElementById('p_score').innerText },
                { s: "Chemistry", m: document.getElementById('c_score').innerText },
                { s: "Biology", m: document.getElementById('b_score').innerText }
            ];

            let tableY = 65;
            stats.forEach(item => {
                doc.setFillColor(248, 250, 252); doc.rect(15, tableY, 180, 12, 'F');
                doc.setFontSize(10); doc.setTextColor(71, 85, 105);
                doc.text(item.s, 20, tableY + 8);
                doc.text(item.m + " Marks", 165, tableY + 8);
                tableY += 15;
            });

            // OMR Visual Reconstruction
            doc.setFontSize(11); doc.setTextColor(15, 23, 42); doc.text("OMR RECONSTRUCTION", 15, tableY + 5);
            let startX = 15, startY = tableY + 15, colWidth = 46, rowHeight = 4.2;

            for (let i = 0; i < 180; i++) {
                let col = Math.floor(i / 45), row = i % 45;
                let x = startX + (col * colWidth), y = startY + (row * rowHeight);
                doc.setTextColor(203, 213, 225); doc.setFontSize(5); doc.text(`${i + 1}`, x, y);

                for (let b = 1; b <= 4; b++) {
                    let bx = x + 6 + (b * 6.5), by = y - 1;
                    if (ANS[i] == b) {
                        doc.setFillColor(ANS[i] == KEY[i] ? [16,185,129] : [244,63,94]);
                        doc.circle(bx, by, 1.4, 'F');
                    } else if (KEY[i] == b && ANS[i] !== null) {
                        doc.setDrawColor(16, 185, 129); doc.circle(bx, by, 1.4, 'D');
                    } else {
                        doc.setDrawColor(226, 232, 240); doc.circle(bx, by, 1.4, 'D');
                    }
                }
            }

            const pdfBlob = doc.output('blob');
            const url = URL.createObjectURL(pdfBlob);
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
