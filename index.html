<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEET STRIDE PRO | Elite Evaluator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #4f46e5; --success: #10b981; --danger: #f43f5e; }
        body { -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }
        .omr-bubble { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .omr-bubble:active { transform: scale(0.85); }
        .glass-morphism { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border-top: 1px solid rgba(0,0,0,0.05); }
        .subject-card { border-left: 4px solid var(--primary); }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-results { animation: slideUp 0.5s ease-out forwards; }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen pb-40">

    <div id="startOverlay" class="fixed inset-0 z-[1000] bg-slate-900 flex items-center justify-center p-4">
        <div class="bg-white rounded-[2rem] p-8 max-w-lg w-full shadow-2xl text-center">
            <div class="w-20 h-20 bg-indigo-100 rounded-2xl flex items-center justify-center mx-auto mb-6">
                <span class="text-4xl">🎯</span>
            </div>
            <h1 class="text-3xl font-black text-slate-800 mb-2">NEET STRIDE <span class="text-indigo-600">PRO</span></h1>
            <p class="text-slate-500 mb-8 text-sm">Professional OMR Evaluation System. <br>3 Hours • 180 Questions • +4/-1 Marking</p>
            <button onclick="launchApp()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold text-xl hover:bg-indigo-700 shadow-xl shadow-indigo-200">INITIALIZE EXAM</button>
        </div>
    </div>

    <nav class="sticky top-0 z-50 bg-slate-900 text-white p-4 shadow-lg">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex flex-col">
                <span class="text-[10px] uppercase tracking-widest text-indigo-400 font-bold">Live Session</span>
                <span id="timerDisplay" class="font-mono text-2xl font-bold">03:00:00</span>
            </div>
            <div class="flex gap-2">
                <button onclick="window.location.reload()" class="bg-slate-800 p-2 rounded-xl text-xs px-4 border border-slate-700">Reset</button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 pt-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-12">
            <div class="lg:col-span-2 space-y-4">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 subject-card">
                    <label class="block text-xs font-black text-slate-400 uppercase mb-2">Student Details</label>
                    <input type="text" id="nameInp" placeholder="Enter Full Name" class="w-full text-lg font-bold border-none outline-none focus:ring-0 placeholder:text-slate-300">
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <label class="block text-xs font-black text-slate-400 uppercase mb-2">Answer Key (Paste 180 Digits)</label>
                    <textarea id="keyInp" class="w-full h-24 bg-slate-50 rounded-2xl p-4 text-xs font-mono border-none focus:ring-2 focus:ring-indigo-500" placeholder="Example: 12341234..."></textarea>
                    <button onclick="lockKey()" id="lockBtn" class="mt-4 w-full bg-slate-800 text-white py-3 rounded-xl font-bold text-sm tracking-wide">LOCK KEY ENGINE</button>
                </div>
            </div>

            <div class="bg-indigo-600 rounded-[2rem] p-8 text-white flex flex-col justify-center relative overflow-hidden">
                <div class="relative z-10">
                    <h3 class="text-4xl font-black mb-2">Submit</h3>
                    <p class="text-indigo-100 text-sm mb-6">Confirm and evaluate all 180 responses instantly.</p>
                    <button onclick="processFinal()" id="finalSubmit" class="w-full bg-white text-indigo-600 py-4 rounded-2xl font-black text-lg shadow-xl active:scale-95 transition-all">FINISH EXAM</button>
                    <button onclick="exportPDF()" id="pdfBtn" style="display:none" class="w-full bg-emerald-500 text-white py-4 rounded-2xl font-black text-lg shadow-xl flex items-center justify-center gap-2"><span>📥</span> DOWNLOAD PDF</button>
                </div>
                <div class="absolute -right-10 -bottom-10 text-[10rem] opacity-10 font-black">720</div>
            </div>
        </div>

        <div id="omrContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            </div>
    </main>

    <div id="resBar" class="fixed bottom-0 left-0 right-0 glass-morphism p-6 translate-y-full transition-transform duration-500 z-[100]">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex gap-8 text-center">
                <div>
                    <p class="text-[10px] font-black text-slate-400 uppercase">Physics</p>
                    <p id="p_score" class="text-2xl font-black text-slate-800">0</p>
                </div>
                <div>
                    <p class="text-[10px] font-black text-slate-400 uppercase">Chemistry</p>
                    <p id="c_score" class="text-2xl font-black text-slate-800">0</p>
                </div>
                <div>
                    <p class="text-[10px] font-black text-slate-400 uppercase">Biology</p>
                    <p id="b_score" class="text-2xl font-black text-slate-800">0</p>
                </div>
            </div>
            <div class="h-16 w-[2px] bg-slate-100 hidden md:block"></div>
            <div class="text-center md:text-right">
                <p class="text-sm font-bold text-indigo-600 uppercase tracking-tighter">Grand Merit Score</p>
                <div class="flex items-baseline justify-center md:justify-end gap-1">
                    <span id="total_score" class="text-6xl font-black text-slate-900 leading-none">0</span>
                    <span class="text-slate-300 font-bold">/720</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let KEY = [], ANS = new Array(180).fill(null), FINISHED = false;
        let SECONDS = 10800;

        function launchApp() {
            document.getElementById('startOverlay').style.display = 'none';
            initGrid();
            const timer = setInterval(() => {
                if(FINISHED || SECONDS <= 0) return clearInterval(timer);
                SECONDS--;
                let h=Math.floor(SECONDS/3600), m=Math.floor((SECONDS%3600)/60), s=SECONDS%60;
                document.getElementById('timerDisplay').innerText = 
                    `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            }, 1000);
        }

        function initGrid() {
            const container = document.getElementById('omrContainer');
            const sections = [
                { name: "Physics", start: 1, end: 45 },
                { name: "Chemistry", start: 46, end: 90 },
                { name: "Biology I", start: 91, end: 135 },
                { name: "Biology II", start: 136, end: 180 }
            ];

            sections.forEach(sec => {
                const wrap = document.createElement('div');
                wrap.className = "bg-white p-4 rounded-[2rem] shadow-sm border border-slate-100";
                wrap.innerHTML = `<h4 class="text-center font-black text-indigo-600 text-xs mb-4 uppercase tracking-widest">${sec.name}</h4>`;
                
                for(let i=sec.start; i<=sec.end; i++) {
                    const row = document.createElement('div');
                    row.className = "flex items-center justify-between mb-2 group";
                    row.innerHTML = `
                        <span class="text-[10px] font-bold text-slate-300 w-6">${i}</span>
                        <div class="flex gap-1" data-q="${i}">
                            ${[1,2,3,4].map(n => `
                                <button onclick="handleBubble(${i},${n},this)" 
                                    class="omr-bubble w-9 h-9 rounded-xl border-2 border-slate-50 bg-slate-50 text-slate-400 font-bold text-xs flex items-center justify-center">
                                    ${n}
                                </button>
                            `).join('')}
                        </div>
                    `;
                    wrap.appendChild(row);
                }
                container.appendChild(wrap);
            });
        }

        function handleBubble(q, v, btn) {
            if(FINISHED) return;
            const parent = btn.parentElement;
            const buttons = parent.querySelectorAll('button');
            
            if(ANS[q-1] === v) {
                ANS[q-1] = null;
                btn.className = "omr-bubble w-9 h-9 rounded-xl border-2 border-slate-50 bg-slate-50 text-slate-400 font-bold text-xs flex items-center justify-center";
            } else {
                buttons.forEach(b => b.className = "omr-bubble w-9 h-9 rounded-xl border-2 border-slate-50 bg-slate-50 text-slate-400 font-bold text-xs flex items-center justify-center");
                ANS[q-1] = v;
                btn.className = "omr-bubble w-9 h-9 rounded-xl border-2 border-indigo-600 bg-indigo-600 text-white font-bold text-xs flex items-center justify-center shadow-lg shadow-indigo-100";
            }
        }

        function lockKey() {
            const raw = document.getElementById('keyInp').value;
            KEY = raw.match(/[1-4]/g) || [];
            if(KEY.length >= 180) {
                document.getElementById('lockBtn').innerText = "✅ ENGINE READY";
                document.getElementById('lockBtn').className = "mt-4 w-full bg-emerald-500 text-white py-3 rounded-xl font-bold text-sm";
                alert("Master Answer Key Loaded Successfully.");
            } else {
                alert(`Error: Need 180 answers, but only found ${KEY.length}. Check your text.`);
            }
        }

        function processFinal() {
            if(KEY.length < 180) return alert("System cannot evaluate without a 180-digit Master Key.");
            FINISHED = true;
            
            // UI Switches
            document.getElementById('finalSubmit').style.display = 'none';
            document.getElementById('pdfBtn').style.display = 'flex';
            document.getElementById('resBar').classList.remove('translate-y-full');

            let p=0, c=0, b=0;
            ANS.forEach((val, i) => {
                let points = 0;
                if(val == KEY[i]) points = 4;
                else if(val !== null) points = -1;

                if(i < 45) p += points;
                else if(i < 90) c += points;
                else b += points;

                // Visual Feedback on Grid
                const bubbles = document.querySelectorAll(`[data-q="${i+1}"] button`);
                bubbles.forEach(btn => {
                    const bv = parseInt(btn.innerText);
                    if(val == bv) {
                        btn.style.background = (val == KEY[i]) ? '#10b981' : '#f43f5e';
                        btn.style.borderColor = (val == KEY[i]) ? '#10b981' : '#f43f5e';
                        btn.style.color = 'white';
                    } else if(bv == KEY[i] && val !== null) {
                        btn.style.borderColor = '#10b981';
                        btn.style.color = '#10b981';
                        btn.style.borderStyle = 'dashed';
                    }
                });
            });

            document.getElementById('p_score').innerText = p;
            document.getElementById('c_score').innerText = c;
            document.getElementById('b_score').innerText = b;
            document.getElementById('total_score').innerText = p+c+b;
        }

        async function exportPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('p', 'mm', 'a4');
    const name = (document.getElementById('nameInp').value || "Candidate").toUpperCase();
    const score = document.getElementById('total_score').innerText;
    const pVal = document.getElementById('p_score').innerText;
    const cVal = document.getElementById('c_score').innerText;
    const bVal = document.getElementById('b_score').innerText;

    // --- HEADER SECTION ---
    doc.setFillColor(30, 41, 59); doc.rect(0, 0, 210, 40, 'F');
    doc.setTextColor(255); doc.setFontSize(22); doc.text("NEET PERFORMANCE REPORT", 15, 20);
    doc.setFontSize(10); doc.text(`STUDENT: ${name}  |  TOTAL SCORE: ${score}/720`, 15, 30);

    // --- ANALYTICS TABLE ---
    doc.setTextColor(30, 41, 59); doc.setFontSize(12); doc.text("Subject Analysis", 15, 50);
    doc.setDrawColor(226, 232, 240); doc.line(15, 52, 195, 52);

    let tableY = 60;
    const stats = [
        { s: "Physics", m: pVal, acc: Math.max(0, (pVal/180)*100).toFixed(1) + "%" },
        { s: "Chemistry", m: cVal, acc: Math.max(0, (cVal/180)*100).toFixed(1) + "%" },
        { s: "Biology", m: bVal, acc: Math.max(0, (bVal/360)*100).toFixed(1) + "%" }
    ];

    stats.forEach(item => {
        doc.setFillColor(248, 250, 252); doc.rect(15, tableY, 180, 10, 'F');
        doc.setFontSize(10); doc.setTextColor(71, 85, 105);
        doc.text(item.s, 20, tableY + 6.5);
        doc.text("Score: " + item.m, 80, tableY + 6.5);
        doc.text("Relative Accuracy: " + item.acc, 130, tableY + 6.5);
        tableY += 12;
    });

    // --- VISUAL OMR GRID GENERATOR ---
    doc.setFontSize(11); doc.setTextColor(30, 41, 59); doc.text("Detailed Response Grid", 15, tableY + 5);
    doc.setFontSize(6); doc.setTextColor(148, 163, 184);
    doc.text("Green = Correct | Red = Wrong | Circle = Your Choice | Dash = Key", 15, tableY + 9);

    let startX = 15;
    let startY = tableY + 15;
    let colWidth = 46;
    let rowHeight = 4.2;

    for (let i = 0; i < 180; i++) {
        let col = Math.floor(i / 45);
        let row = i % 45;
        let x = startX + (col * colWidth);
        let y = startY + (row * rowHeight);

        // Question Number
        doc.setTextColor(148, 163, 184); doc.setFontSize(5);
        doc.text(`${i + 1}`, x, y);

        // Draw 4 Bubbles for each question
        for (let b = 1; b <= 4; b++) {
            let bx = x + 6 + (b * 6.5);
            let by = y - 1;
            let userChoice = ANS[i];
            let correctChoice = KEY[i];

            doc.setLineWidth(0.1);
            if (userChoice == b) {
                // Fill bubble: Green if right, Red if wrong
                if (userChoice == correctChoice) doc.setFillColor(16, 185, 129);
                else doc.setFillColor(244, 63, 94);
                doc.circle(bx, by, 1.4, 'F');
            } else if (correctChoice == b && userChoice !== null) {
                // Outline correct answer if user got it wrong
                doc.setDrawColor(16, 185, 129);
                doc.circle(bx, by, 1.4, 'D');
            } else {
                // Empty bubble
                doc.setDrawColor(226, 232, 240);
                doc.circle(bx, by, 1.4, 'D');
            }
        }
    }

    // --- FOOTER ---
    doc.setFontSize(8); doc.setTextColor(203, 213, 225);
    doc.text("Generated by NEET STRIDE PRO - Digital OMR Evaluator", 105, 285, { align: "center" });

    // --- SMART DOWNLOAD TRIGGER ---
    const pdfBlob = doc.output('blob');
    const url = URL.createObjectURL(pdfBlob);
    
    // For iPad/Brave: Opens in new tab so user can "Save to Files"
    const newTab = window.open(url, '_blank');
    if (!newTab) {
        // Fallback for popup blockers
        doc.save(`${name}_NEET_Analysis.pdf`);
    }
}
